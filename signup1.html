<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - High Stars Aimers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body {
        background: radial-gradient(circle at top, #0a0f1f, #000);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
        padding: 20px 0;
    }
    .signup-container {
        position: relative;
        width: 350px;
        padding: 40px 30px;
        border-radius: 15px;
        text-align: center;
        overflow: hidden;
    }
    /* Rotating glowing border */
    .signup-container::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(
            #ff0000,
            #ff00ff,
            #00ffff,
            #ff0000
        );
        animation: rotate 4s linear infinite;
        z-index: 0;
        filter: blur(10px);
    }
    /* Inner black background */
    .signup-container::after {
        content: '';
        position: absolute;
        top: 5px;
        left: 5px;
        right: 5px;
        bottom: 5px;
        background: rgba(0,0,0,0.9);
        border-radius: 15px;
        z-index: 1;
    }
    @keyframes rotate {
        100% { transform: rotate(360deg); }
    }

    .signup-box {
        position: relative;
        z-index: 2;
    }
    .signup-box h2 {
        margin-bottom: 20px;
        color: #00f0ff;
        text-shadow: 0 0 10px #00f0ff;
    }
    .signup-box label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
        text-align: left;
        color: #00f0ff;
    }
    .password-wrapper {
        position: relative;
    }
    .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #00f0ff;
    }
    .signup-box input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        background: transparent;
        border: 2px solid #00f0ff;
        border-radius: 25px;
        color: white;
        outline: none;
        transition: 0.3s;
        text-align: center;
    }
    .signup-box input:focus {
        box-shadow: 0 0 15px #00f0ff;
    }
    .signup-box input[type="submit"] {
        background: #00f0ff;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
    }
    .signup-box input[type="submit"]:hover {
        background: #00c0cc;
        box-shadow: 0 0 20px #00f0ff;
    }

    /* Google Sign In Styling */
    .divider {
        margin: 20px 0;
        display: flex;
        align-items: center;
        text-align: center;
        color: #666;
    }
    .divider::before, .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #444;
    }
    .divider:not(:empty)::before { margin-right: .25em; }
    .divider:not(:empty)::after { margin-left: .25em; }

    .google-btn {
        width: 100%;
        padding: 10px;
        background: white;
        border-radius: 25px;
        border: none;
        color: #000;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
        transition: 0.3s;
    }
    .google-btn:hover {
        background: #eee;
        transform: scale(1.02);
    }

    .message {
        margin-top: 15px;
        font-size: 14px;
    }
    .back-link {
        margin-top: 20px;
        display: inline-block;
        color: #00f0ff;
        text-decoration: none;
    }
    .back-link:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="signup-container">
    <div class="signup-box">
        <h2>Create Account</h2>

        <form onsubmit="return registerUser()">
            <label for="newEmail">Email</label>
            <input type="email" id="newEmail" required>

            <label for="newPassword">Password</label>
            <div class="password-wrapper">
                <input type="password" id="newPassword" required>
                <i class="fas fa-eye toggle-password" onclick="togglePassword('newPassword', this)"></i>
            </div>

            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" required>
                <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
            </div>

            <input type="submit" value="Sign Up">
        </form>

        <div class="divider">OR</div>

        <button class="google-btn" id="googleBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Continue with Google
        </button>

        <p class="message" id="signupMsg"></p>

        <a class="back-link" href="signin1.html">Already have an account? Sign In</a>
    </div>
</div>

<script>
    function togglePassword(fieldId, icon) {
        const field = document.getElementById(fieldId);
        const type = field.getAttribute("type") === "password" ? "text" : "password";
        field.setAttribute("type", type);
        icon.classList.toggle("fa-eye");
        icon.classList.toggle("fa-eye-slash");
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { 
        getAuth, 
        createUserWithEmailAndPassword, 
        sendEmailVerification,
        GoogleAuthProvider,
        signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
      authDomain: "high-stars-aimers-5972f.firebaseapp.com",
      projectId: "high-stars-aimers-5972f",
      storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
      messagingSenderId: "233345875942",
      appId: "1:233345875942:web:0b21df2fd59b744d2ce027",
      measurementId: "G-JEV6M3EP1D"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app); 
    const googleProvider = new GoogleAuthProvider();
    
    window.registerUser = registerUser;

    // --- Google Sign In Logic ---
    document.getElementById('googleBtn').onclick = () => {
        signInWithPopup(auth, googleProvider)
            .then(() => {
                window.location.href = "index.html"; // Redirect to dashboard
            })
            .catch((error) => {
                const message = document.getElementById("signupMsg");
                message.style.color = "red";
                message.textContent = error.message;
            });
    };

    // --- Standard Signup Logic ---
    function registerUser() {
        const email = document.getElementById("newEmail").value.trim();
        const password = document.getElementById("newPassword").value;
        const confirm = document.getElementById("confirmPassword").value;
        const message = document.getElementById("signupMsg");

        message.textContent = "";

        if (password !== confirm) {
            message.style.color = "red";
            message.textContent = "Passwords do not match.";
            return false;
        }

        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                const user = userCredential.user;
                sendEmailVerification(user).then(() => {
                    message.style.color = "green";
                    message.textContent = "Account created successfully! Check your email to verify your account before logging in.";
                    
                    document.getElementById("newEmail").value = '';
                    document.getElementById("newPassword").value = '';
                    document.getElementById("confirmPassword").value = '';
                });
            })
            .catch((error) => {
                message.style.color = "red";
                let errorMessage = error.message;
                if(error.code === 'auth/email-already-in-use') errorMessage = 'Email already registered.';
                if(error.code === 'auth/weak-password') errorMessage = 'Password must be at least 6 characters.';
                
                message.textContent = errorMessage;
            });

        return false;
    }
</script>

</body>
</html>
