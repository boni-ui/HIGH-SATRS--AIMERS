<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | High Stars Aimers</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #38bdf8;
      --bg-dark: #0f172a;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Subtle Animated Background Elements */
    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: #38bdf8;
      border-radius: 50%;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
      animation: floatUp 15s infinite linear;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh) scale(1); opacity: 0; }
      50% { opacity: 0.3; }
      to { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    .container {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      padding: 60px 40px;
      width: 100%;
      max-width: 550px;
      text-align: center;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      z-index: 1;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 36px;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 35px;
      letter-spacing: -1px;
    }

    .info-card {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 45px;
    }

    .contact-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 20px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }

    .contact-item:hover {
      background: rgba(56, 189, 248, 0.08);
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .contact-item i {
      font-size: 22px;
      color: var(--primary);
      width: 45px;
      text-align: center;
    }

    .contact-text {
      text-align: left;
      margin-left: 15px;
    }

    .contact-text span {
      display: block;
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .contact-text p, .contact-text a {
      font-size: 15px;
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 500;
    }

    footer {
      border-top: 1px solid var(--glass-border);
      padding-top: 30px;
    }

    footer p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .social-icons a {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      color: #cbd5e1;
      font-size: 18px;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .social-icons a:hover {
      background: var(--primary);
      color: #0f172a;
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
    }

    /* Custom colors for social brands on hover */
    .fa-facebook-f:hover { color: #1877f2 !important; background: white !important; }
    .fa-instagram:hover { color: #e4405f !important; background: white !important; }
    .fa-x-twitter:hover { color: #000 !important; background: white !important; }
    .fa-youtube:hover { color: #ff0000 !important; background: white !important; }
    .fa-whatsapp:hover { color: #25d366 !important; background: white !important; }

    @media (max-width: 480px) {
      .container { padding: 40px 20px; }
      h1 { font-size: 28px; }
      .contact-text p, .contact-text a { font-size: 13px; }
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>
  <div id="particles-container"></div>

  <div class="container">
    <h1>Connect with Us</h1>

    <div class="info-card">
      <div class="contact-item">
        <i class="fas fa-envelope"></i>
        <div class="contact-text">
          <span>Official Email</span>
          <a href="mailto:highstarsaimersexamnotes@gmail.com">highstarsaimersexamnotes@gmail.com</a>
        </div>
      </div>

      <div class="contact-item">
        <i class="fas fa-phone-alt"></i>
        <div class="contact-text">
          <span>Phone Support</span>
          <p>+(254) 119270436</p>
        </div>
      </div>

      <div class="contact-item">
        <i class="fas fa-map-marker-alt"></i>
        <div class="contact-text">
          <span>Headquarters</span>
          <p>Nyandarua, Kenya</p>
        </div>
      </div>
    </div>

    <footer>
      <p>Follow Boni Mbugua on</p>
      <div class="social-icons">
        <a href="https://www.facebook.com/profile.php?id=61579327734565" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/b.boni.mbugua?igsh=MTJ2Nm13OXl2ajd6dw==" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://x.com/mbugua_bon60636" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a href="https://youtube.com/@bonimbugua?si=qkTx2ZXewtIVz6_v" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://www.tiktok.com/@bonimbugua346?_r=1&_t=ZS-95OIyTwg7ww" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://wa.me/254119270436" target="_blank"><i class="fab fa-whatsapp"></i></a>
      </div>
    </footer>
  </div>

  <script>
    const container = document.getElementById('particles-container');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 1;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (Math.random() * 10 + 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
