<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | High Stars Aimers</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --primary-hover: #1557b0;
            --text-dark: #202124;
            --text-light: #5f6368;
            --bg-color: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .error-container {
            max-width: 600px;
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -5px;
        }

        .error-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 16px;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #ffffff;
            border: 2px solid var(--primary-color);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background-color: rgba(26, 115, 232, 0.05);
        }

        .footer-text {
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-light);
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 80px;
            }
            .error-title {
                font-size: 22px;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            Oops! It looks like we can't find the page you're looking for. The revision paper or study note might have been moved, deleted, or the link might be temporarily broken.
        </p>
        
        <div class="action-buttons">
            <a href="/" class="btn btn-primary">Back to Homepage</a>
            <a href="/materials" class="btn btn-secondary">Browse Study Notes</a>
        </div>

        <div class="footer-text">
            &copy; 2026 High Stars Aimers. All rights reserved.
        </div>
    </div>

</body>
</html>
