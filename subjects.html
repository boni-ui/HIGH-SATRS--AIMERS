<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subject Notes | High Stars Aimers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #00f0ff;
      --secondary: #0072ff;
      --bg: #050a18;
      --card-bg: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
    }

    * { box-sizing: border-box; transition: all 0.25s ease; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #0d1b3e, var(--bg));
      margin: 0;
      min-height: 100vh;
    }

    /* --- Header --- */
    .header {
      padding: 1.2rem 6%;
      background: rgba(5, 10, 24, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header h1 {
      font-size: 1.3rem;
      letter-spacing: 1px;
      margin: 0;
      text-transform: uppercase;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-link {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 15px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
    }

    .nav-link:hover { background: var(--primary); color: #000; }

    /* --- Main Layout --- */
    main {
      padding: 50px 6%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-title h2 {
      font-size: 2.8rem;
      margin: 0;
      font-weight: 800;
    }

    /* --- Search --- */
    .search-box {
      margin-bottom: 50px;
      display: flex;
      justify-content: center;
    }

    #subjectSearch {
      width: 100%;
      max-width: 450px;
      padding: 14px 25px;
      border-radius: 50px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      background: rgba(255,255,255,0.03);
      color: white;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    #subjectSearch:focus { 
      outline: none; 
      border-color: var(--primary); 
      background: rgba(255,255,255,0.07); 
    }

    /* --- Subject Cards --- */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px;
    }

    .subject-card {
      background: var(--card-bg);
      padding: 35px 20px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      position: relative;
    }

    .subject-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary);
      box-shadow: 0 15px 35px rgba(0, 240, 255, 0.1);
    }

    .subject-card i {
      font-size: 2.5rem;
      margin-bottom: 18px;
      color: var(--primary);
      filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.4));
    }

    .subject-card h3 {
      font-size: 1.1rem;
      margin: 0;
      font-weight: 500;
    }

    /* --- Modal Menu --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    .modal-content {
      background: #0f172a;
      padding: 40px;
      border-radius: 30px;
      width: 100%;
      max-width: 380px;
      border: 1px solid rgba(0, 240, 255, 0.3);
      text-align: center;
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .form-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 25px 0;
    }

    .form-link {
      padding: 16px;
      background: rgba(255,255,255,0.05);
      color: white;
      text-decoration: none;
      border-radius: 15px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .form-link:hover {
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      color: #000;
      transform: scale(1.02);
    }

    .btn-close {
      color: #777;
      cursor: pointer;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    footer { text-align: center; padding: 60px 20px; opacity: 0.4; font-size: 0.8rem; }
  </style>
</head>
<body>

  <header class="header">
    <h1>High Stars Aimers</h1>
    <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
  </header>

  <main>
    <div class="page-title">
      <h2>Subject Notes</h2>
      <p style="opacity: 0.6;">Comprehensive study materials for every level</p>
    </div>

    <div class="search-box">
      <input type="text" id="subjectSearch" placeholder="Search your subject...">
    </div>

    <div class="subjects-grid" id="subjectsGrid">
      </div>
  </main>

  <div class="modal-overlay" id="levelModal">
    <div class="modal-content">
      <h3 id="targetSubject" style="margin-top:0; font-size: 1.5rem;">Subject</h3>
      <p style="opacity: 0.6; font-size: 0.9rem;">Select your current class level</p>
      
      <div class="form-options">
        <a href="#" class="form-link" id="f1">Form 1 Notes</a>
        <a href="#" class="form-link" id="f2">Form 2 Notes</a>
        <a href="#" class="form-link" id="f3">Form 3 Notes</a>
        <a href="#" class="form-link" id="f4">Form 4 Notes</a>
      </div>
      
      <span class="btn-close" onclick="closeModal()">Dismiss</span>
    </div>
  </div>

  <footer>&copy; 2026 High Stars Aimers | Precision in Learning</footer>

  <script>
    const subjects = [
      { name: "Mathematics", icon: "fa-square-root-alt" },
      { name: "English", icon: "fa-book" },
      { name: "Kiswahili", icon: "fa-language" },
      { name: "Physics", icon: "fa-atom" },
      { name: "Chemistry", icon: "fa-flask" },
      { name: "Biology", icon: "fa-dna" },
      { name: "Geography", icon: "fa-globe-africa" },
      { name: "History", icon: "fa-landmark" },
      { name: "CRE", icon: "fa-cross" },
      { name: "Business Studies", icon: "fa-briefcase" },
      { name: "Agriculture", icon: "fa-seedling" },
      { name: "Computer Studies", icon: "fa-laptop-code" }
    ];

    const grid = document.getElementById('subjectsGrid');
    const modal = document.getElementById('levelModal');
    const search = document.getElementById('subjectSearch');

    function render(filter = '') {
      grid.innerHTML = '';
      const items = subjects.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()));
      
      items.forEach(sub => {
        const div = document.createElement('div');
        div.className = 'subject-card';
        div.innerHTML = `<i class="fas ${sub.icon}"></i><h3>${sub.name}</h3>`;
        div.onclick = () => openModal(sub.name);
        grid.appendChild(div);
      });
    }

    function openModal(name) {
      document.getElementById('targetSubject').innerText = name;
      // Map URLs (Note: type=subject_notes)
      for(let i=1; i<=4; i++) {
        document.getElementById(`f${i}`).href = `view-resources.html?type=subject_notes&subject=${encodeURIComponent(name)}&form=Form ${i}`;
      }
      modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    // Close when clicking background
    window.onclick = (e) => { if(e.target == modal) closeModal(); }

    // Search trigger
    search.oninput = (e) => render(e.target.value);

    // Run initial display
    render();
  </script>
</body>
</html>
