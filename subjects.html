<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subject Notes | High Stars Aimers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #00f0ff;
      --secondary: #0072ff;
      --bg: #050a18;
      --card-bg: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
    }

    * { box-sizing: border-box; transition: all 0.25s ease; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #0d1b3e, var(--bg));
      margin: 0;
      min-height: 100vh;
    }

    /* --- Header --- */
    .header {
      padding: 1rem 5%;
      background: rgba(5, 10, 24, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header h1 {
      font-size: 1.3rem;
      margin: 0;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-link {
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* --- Hero & Search --- */
    main { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
    
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h2 { font-size: 2.5rem; margin-bottom: 10px; }

    #subjectSearch {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 0 auto 40px auto;
      padding: 15px 25px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--card-bg);
      color: white;
      font-size: 1rem;
      outline: none;
    }

    #subjectSearch:focus { border-color: var(--primary); }

    /* --- Grid --- */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .subject-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 40px 20px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }

    .subject-card:hover {
      transform: translateY(-10px);
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.1);
    }

    .subject-card i {
      font-size: 3rem;
      margin-bottom: 20px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* --- Modal --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-content {
      background: #0f172a;
      padding: 35px;
      border-radius: 25px;
      width: 90%;
      max-width: 400px;
      border: 2px solid var(--primary);
      text-align: center;
    }

    .form-list { display: flex; flex-direction: column; gap: 15px; margin: 25px 0; }

    .form-btn {
      padding: 16px;
      background: rgba(255,255,255,0.05);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }

    .form-btn:hover { background: var(--primary); color: #000; }

    .close-btn { color: #888; cursor: pointer; display: block; margin-top: 15px; }

    footer { text-align: center; padding: 40px; opacity: 0.5; }
  </style>
</head>
<body>

  <header class="header">
    <h1>High Stars Aimers</h1>
    <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
  </header>

  <main>
    <div class="hero">
      <h2>Subject Notes</h2>
      <p>Select a subject to access organized study notes</p>
    </div>

    <input type="text" id="subjectSearch" placeholder="Search for a subject...">

    <div class="subjects-grid" id="subjectsGrid">
      </div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h3 id="modalTitle">Subject</h3>
      <div class="form-list">
        <a href="#" class="form-btn" id="link1">Form 1</a>
        <a href="#" class="form-btn" id="link2">Form 2</a>
        <a href="#" class="form-btn" id="link3">Form 3</a>
        <a href="#" class="form-btn" id="link4">Form 4</a>
      </div>
      <span class="close-btn" onclick="closeModal()">Close Window</span>
    </div>
  </div>

  <footer>&copy; 2026 High Stars Aimers</footer>

  <script>
    const subjects = [
      { name: "Mathematics", icon: "fa-square-root-alt" },
      { name: "English", icon: "fa-book" },
      { name: "Kiswahili", icon: "fa-language" },
      { name: "Physics", icon: "fa-atom" },
      { name: "Chemistry", icon: "fa-flask" },
      { name: "Biology", icon: "fa-dna" },
      { name: "Geography", icon: "fa-globe-africa" },
      { name: "History", icon: "fa-landmark" },
      { name: "CRE", icon: "fa-cross" },
      { name: "Business Studies", icon: "fa-briefcase" },
      { name: "Agriculture", icon: "fa-seedling" },
      { name: "Computer Studies", icon: "fa-laptop-code" }
    ];

    const grid = document.getElementById('subjectsGrid');
    const search = document.getElementById('subjectSearch');
    const modal = document.getElementById('modalOverlay');

    function render(filter = '') {
      grid.innerHTML = '';
      const filtered = subjects.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()));
      
      filtered.forEach(sub => {
        const card = document.createElement('div');
        card.className = 'subject-card';
        card.innerHTML = `<i class="fas ${sub.icon}"></i><h3>${sub.name}</h3>`;
        card.onclick = () => openModal(sub.name);
        grid.appendChild(card);
      });
    }

    function openModal(name) {
      document.getElementById('modalTitle').innerText = name;
      for(let i=1; i<=4; i++) {
        // Updated type to subject_notes for this specific page
        document.getElementById(`link${i}`).href = `view-resources.html?type=subject_notes&subject=${encodeURIComponent(name)}&form=Form ${i}`;
      }
      modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    window.onclick = (e) => { if(e.target == modal) closeModal(); }
    search.oninput = (e) => render(e.target.value);

    render();
  </script>
</body>
</html>
