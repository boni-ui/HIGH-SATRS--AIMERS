<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subject Notes | High Stars Aimers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Google Font for Inter */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary: #00f0ff;
      --secondary: #0072ff;
      --bg: #050a18;
      --card-bg: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
    }

    * { box-sizing: border-box; transition: all 0.25s ease; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #0d1b3e, var(--bg));
      margin: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Header --- */
    .header {
      padding: 1rem 5%;
      background: rgba(5, 10, 24, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header h1 {
      font-size: 1.3rem;
      margin: 0;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    .nav-link {
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .nav-link:hover {
        color: var(--primary);
    }

    /* --- Hero & Search --- */
    main { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
    
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h2 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 700; }
    .hero p { opacity: 0.8; }

    #subjectSearch {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 0 auto 40px auto;
      padding: 15px 25px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--card-bg);
      color: white;
      font-size: 1rem;
      outline: none;
    }

    #subjectSearch:focus { 
        border-color: var(--primary); 
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }

    /* --- Grid --- */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* --- IMPORTANT: SUBJECT CARDS GENERATED BY JS --- */
    .subject-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 40px 20px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }

    .subject-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 20px rgba(0, 240, 255, 0.1);
    }

    .subject-card i {
      font-size: 3rem;
      margin-bottom: 20px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .subject-card h3 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
    }

    /* --- Modal --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-content {
      background: #0f172a;
      padding: 35px;
      border-radius: 25px;
      width: 90%;
      max-width: 400px;
      border: 2px solid var(--primary);
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
    }

    .modal-content h3 {
        margin-top: 0;
        font-size: 1.5rem;
        font-weight: 700;
    }

    .form-list { display: flex; flex-direction: column; gap: 15px; margin: 25px 0; }

    .form-btn {
      padding: 16px;
      background: rgba(255,255,255,0.05);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .form-btn:hover { 
        background: var(--primary); 
        color: #000; 
        border-color: var(--primary);
    }

    .close-btn { 
        color: #888; 
        cursor: pointer; 
        display: block; 
        margin-top: 15px; 
        font-size: 0.9rem;
    }
    
    .close-btn:hover {
        color: white;
    }

    footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.9rem;}
  </style>
</head>
<body>

  <header class="header">
    <h1>High Stars Aimers</h1>
    <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
  </header>

  <main>
    <div class="hero">
      <h2>Subject Notes</h2>
      <p>Select a subject to access organized study notes</p>
    </div>

    <input type="text" id="subjectSearch" placeholder="Search for a subject...">

    <div class="subjects-grid" id="subjectsGrid">
        </div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h3 id="modalTitle">Subject</h3>
      <div class="form-list">
        <a href="#" class="form-btn" id="link1">Form 1</a>
        <a href="#" class="form-btn" id="link2">Form 2</a>
        <a href="#" class="form-btn" id="link3">Form 3</a>
        <a href="#" class="form-btn" id="link4">Form 4</a>
      </div>
      <span class="close-btn" onclick="closeModal()">Close Window</span>
    </div>
  </div>

  <footer>&copy; 2026 High Stars Aimers</footer>

  <script>
    // Define subjects and their FontAwesome icons
    const subjectsList = [
      { name: "Mathematics", icon: "fa-square-root-alt" },
      { name: "English", icon: "fa-book" },
      { name: "Kiswahili", icon: "fa-language" },
      { name: "Physics", icon: "fa-atom" },
      { name: "Chemistry", icon: "fa-flask" },
      { name: "Biology", icon: "fa-dna" },
      { name: "Geography", icon: "fa-globe-africa" },
      { name: "History", icon: "fa-landmark" },
      { name: "CRE", icon: "fa-cross" },
      { name: "Business Studies", icon: "fa-briefcase" },
      { name: "Agriculture", icon: "fa-seedling" },
      { name: "Computer Studies", icon: "fa-laptop-code" }
    ];

    // Get DOM elements
    const grid = document.getElementById('subjectsGrid');
    const search = document.getElementById('subjectSearch');
    const modal = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');

    // Function to render subject cards based on filter
    function render(filter = '') {
      // Clear current grid content
      grid.innerHTML = '';
      
      // Filter subjects based on search input
      const filteredSubjects = subjectsList.filter(s => 
        s.name.toLowerCase().includes(filter.toLowerCase())
      );
      
      // Generate HTML for each subject card
      filteredSubjects.forEach(sub => {
        const card = document.createElement('div');
        card.className = 'subject-card';
        // Match the HTML structure used by the CSS
        card.innerHTML = `<i class="fas ${sub.icon}"></i><h3>${sub.name}</h3>`;
        
        // Add click event to open modal
        card.onclick = () => openModal(sub.name);
        
        // Append card to grid
        grid.appendChild(card);
      });
    }

    // Function to open modal and populate links
    function openModal(subjectName) {
      modalTitle.innerText = subjectName;
      
      // Update links for Form 1 through Form 4
      for(let i=1; i<=4; i++) {
        // Set href to resources page with proper query parameters
        const linkElement = document.getElementById(`link${i}`);
        if(linkElement) {
            linkElement.href = `view-resources.html?type=subject_notes&subject=${encodeURIComponent(subjectName)}&form=Form ${i}`;
        }
      }
      
      // Display modal
      modal.style.display = 'flex';
    }

    // Function to close modal
    function closeModal() { 
        modal.style.display = 'none'; 
    }

    // Event listener: Close modal when clicking on overlay background
    window.onclick = (event) => { 
        if(event.target == modal) {
            closeModal(); 
        }
    }

    // Event listener: Trigger search rendering on input change
    search.addEventListener('input', (event) => {
        render(event.target.value);
    });

    // Initial render call to populate the grid
    render();
  </script>
</body>
</html>
