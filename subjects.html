<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revision Papers | High Stars Aimers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #00f0ff;
      --secondary: #0072ff;
      --bg: #030712;
      --card-bg: rgba(255, 255, 255, 0.03);
      --text: #ffffff;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #0b1120 0%, #030712 100%);
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Header --- */
    .header {
      padding: 1.2rem 6%;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(15px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header h1 {
      font-size: 1.4rem;
      margin: 0;
      color: var(--primary);
      font-weight: 700;
    }

    .nav-link {
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    /* --- Hero Section --- */
    main { padding: 50px 6%; max-width: 1200px; margin: 0 auto; }
    
    .hero { text-align: center; margin-bottom: 30px; }
    .hero h2 { font-size: 3rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; }
    .hero p { color: #94a3b8; font-size: 1.1rem; }

    /* --- Search Bar --- */
    .search-container { position: relative; max-width: 600px; margin: 0 auto 50px auto; }

    #subjectSearch {
      width: 100%;
      padding: 18px 30px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1.1rem;
      outline: none;
      text-align: left;
    }

    #subjectSearch:focus { 
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
    }

    /* --- Grid --- */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 25px;
    }

    .subject-card {
      background: var(--card-bg);
      padding: 50px 20px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
    }

    .subject-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .subject-card i {
      font-size: 3.5rem;
      margin-bottom: 25px;
      background: linear-gradient(135deg, #6366f1, #00f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: block;
    }

    .subject-card h3 { font-size: 1.25rem; margin: 0; font-weight: 600; }

    /* --- Modal --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-content {
      background: #0f172a;
      padding: 40px;
      border-radius: 30px;
      width: 90%;
      max-width: 420px;
      border: 1px solid var(--primary);
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
    }

    .modal-content h3 { font-size: 1.5rem; margin-bottom: 30px; font-weight: 700; }

    .form-list { display: flex; flex-direction: column; gap: 15px; }

    .form-btn {
      padding: 18px;
      background: #1e293b;
      color: white;
      text-decoration: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1.05rem;
      border: 1px solid transparent;
    }

    .form-btn:hover { 
        background: #334155;
        border-color: var(--primary);
    }

    .close-btn { 
        color: #64748b; 
        cursor: pointer; 
        display: block; 
        margin-top: 25px; 
        font-size: 0.95rem;
        text-decoration: none;
    }
    
    .close-btn:hover { color: white; }

    footer { text-align: center; padding: 60px 20px; opacity: 0.4; font-size: 0.9rem; }
  </style>
</head>
<body>

  <header class="header">
    <h1>High Stars Aimers</h1>
    <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
  </header>

  <main>
    <div class="hero">
      <h2>Revision Papers</h2>
      <p>Select a subject to begin your revision journey</p>
    </div>

    <div class="search-container">
      <input type="text" id="subjectSearch" placeholder="Search for a subject (e.g. Physics)...">
    </div>

    <div class="subjects-grid" id="subjectsGrid">
      </div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h3 id="modalTitle">Subject</h3>
      <div class="form-list">
        <a href="#" class="form-btn" id="link1">Form 1</a>
        <a href="#" class="form-btn" id="link2">Form 2</a>
        <a href="#" class="form-btn" id="link3">Form 3</a>
        <a href="#" class="form-btn" id="link4">Form 4</a>
      </div>
      <span class="close-btn" onclick="closeModal()">Close Window</span>
    </div>
  </div>

  <footer>&copy; 2026 High Stars Aimers</footer>

  <script>
    const subjects = [
      { name: "Mathematics", icon: "fa-square-root-alt" },
      { name: "English", icon: "fa-book" },
      { name: "Kiswahili", icon: "fa-language" },
      { name: "Physics", icon: "fa-atom" },
      { name: "Chemistry", icon: "fa-flask" },
      { name: "Biology", icon: "fa-dna" },
      { name: "Geography", icon: "fa-globe-africa" },
      { name: "History", icon: "fa-landmark" },
      { name: "CRE", icon: "fa-cross" },
      { name: "Business Studies", icon: "fa-briefcase" },
      { name: "Agriculture", icon: "fa-seedling" },
      { name: "Computer Studies", icon: "fa-laptop-code" }
    ];

    const grid = document.getElementById('subjectsGrid');
    const search = document.getElementById('subjectSearch');
    const modal = document.getElementById('modalOverlay');

    function render(filter = '') {
      grid.innerHTML = '';
      const filtered = subjects.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()));
      
      filtered.forEach(sub => {
        const card = document.createElement('div');
        card.className = 'subject-card';
        card.innerHTML = `<i class="fas ${sub.icon}"></i><h3>${sub.name}</h3>`;
        card.onclick = () => openModal(sub.name);
        grid.appendChild(card);
      });
    }

    function openModal(name) {
      document.getElementById('modalTitle').innerText = name;
      for(let i=1; i<=4; i++) {
        document.getElementById(`link${i}`).href = `view-resources.html?type=revision_papers&subject=${encodeURIComponent(name)}&form=Form ${i}`;
      }
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden'; // Prevent scroll
    }

    function closeModal() { 
      modal.style.display = 'none'; 
      document.body.style.overflow = 'auto';
    }

    window.onclick = (e) => { if(e.target == modal) closeModal(); }
    search.oninput = (e) => render(e.target.value);

    render();
  </script>
</body>
</html>
