<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSA Vault Core | Professional Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #f57c00; --bg: #05080f; --card: #0c121e; --text: #ffffff; --dim: #94a3b8; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px 20px; }
        .container { max-width: 850px; margin: 0 auto; }

        /* Professional Card System */
        .file-item { background: var(--card); border: 1px solid var(--border); padding: 28px; border-radius: 20px; margin-bottom: 20px; transition: all 0.3s ease; position: relative; }
        .file-item:hover { border-color: var(--primary); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
        
        .type-pill { background: rgba(245, 124, 0, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .file-name { font-size: 1.25rem; font-weight: 700; margin: 10px 0; display: block; }

        /* Collapsible Summary System */
        .summary-wrapper { position: relative; margin: 15px 0; }
        .doc-summary { font-size: 0.9rem; color: var(--dim); line-height: 1.7; max-height: 75px; overflow: hidden; transition: max-height 0.4s ease; position: relative; }
        .doc-summary.expanded { max-height: 1000px; }
        .doc-summary::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; background: linear-gradient(transparent, var(--card)); opacity: 0; transition: opacity 0.3s; }
        .doc-summary:not(.expanded)::after { opacity: 1; }
        
        .toggle-btn { background: none; border: none; color: var(--primary); font-size: 0.75rem; font-weight: 800; cursor: pointer; margin-top: 8px; display: none; }
        
        .footer-metrics { display: flex; align-items: center; gap: 20px; border-top: 1px solid var(--border); padding-top: 20px; margin-top: 15px; color: var(--dim); font-size: 0.85rem; }
        .view-btn { margin-left: auto; background: var(--primary); color: #fff; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .view-btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="container">
        <div id="fileList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // ... [Insert your Firebase Config Here] ...

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const listContainer = document.getElementById('fileList');

        async function fetchVaultData() {
            const snap = await getDocs(collection(db, "resource_metrics"));
            listContainer.innerHTML = "";
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const element = document.createElement('div');
                element.className = 'file-item';
                
                element.innerHTML = `
                    <span class="type-pill">Portable Document</span>
                    <span class="file-name">${data.name}</span>
                    <div class="summary-wrapper">
                        <div class="doc-summary" id="sum-${docSnap.id}">${data.summary || "No overview available."}</div>
                        <button class="toggle-btn" id="btn-${docSnap.id}">Read more</button>
                    </div>
                    <div class="footer-metrics">
                        <span><i class="fas fa-eye"></i> ${data.downloads || 0}</span>
                        <span><i class="fas fa-thumbs-up"></i> ${data.likes || 0}</span>
                        <button class="view-btn">View Document</button>
                    </div>
                `;
                listContainer.appendChild(element);

                // Initialize Toggle Logic
                const sum = document.getElementById(`sum-${docSnap.id}`);
                const btn = document.getElementById(`btn-${docSnap.id}`);
                if(sum.scrollHeight > 78) {
                    btn.style.display = 'block';
                    btn.onclick = () => {
                        sum.classList.toggle('expanded');
                        btn.innerText = sum.classList.contains('expanded') ? 'Read less' : 'Read more';
                    };
                }
            });
        }
        fetchVaultData();
    </script>
</body>
</html>
