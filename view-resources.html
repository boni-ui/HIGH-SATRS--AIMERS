<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Stars Aimers | Resource Hub Vault</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #f57c00; --bg-deep: #05080f; --card-bg: rgba(255, 255, 255, 0.03); --text: #ffffff; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text); min-height: 100vh; padding: 30px 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        
        .header-wrapper { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .controls { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; color: white; }
        
        .file-item { background: var(--card-bg); border: 1px solid var(--border); padding: 18px; border-radius: 16px; margin-bottom: 16px; }
        .file-name { font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .interaction-bar { display: flex; gap: 15px; margin-bottom: 12px; font-size: 0.8rem; color: var(--text-dim); }
        .interact-btn { cursor: pointer; }
        .interact-btn:hover { color: var(--primary); }

        .doc-summary { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
        .toggle-btn { color: var(--primary); cursor: pointer; font-size: 0.8rem; text-decoration: underline; display: inline-block; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 10px; }
        .view-btn, .download-btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-wrapper">
            <h1 id="pageTitle">Vault Core</h1>
        </div>
        <div class="controls"><input type="text" id="searchInput" placeholder="Search..." onkeyup="filterResources()"></div>
        <div id="fileList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, doc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
            authDomain: "high-stars-aimers-5972f.firebaseapp.com",
            projectId: "high-stars-aimers-5972f",
            storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
            messagingSenderId: "233345875942",
            appId: "1:233345875942:web:cf7610de84f0b2262ce027"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global functions for UI interactions
        window.incrementView = async (id) => { await updateDoc(doc(db, "resource_metrics", id), { views: increment(1) }); };
        window.addComment = async (id) => {
            const comment = prompt("Enter your comment:");
            if (comment) { await updateDoc(doc(db, "resource_metrics", id), { comments: arrayUnion(comment) }); location.reload(); }
        };

        window.toggleSummary = (id, fullText) => {
            const el = document.getElementById(`sum-${id}`);
            const isExpanded = el.getAttribute('data-expanded') === 'true';
            const textParts = fullText.split(/[•\-\n]/).filter(p => p.trim().length > 0);
            const toggleBtn = `<span class="toggle-btn" onclick="toggleSummary('${id}', \`${fullText.replace(/'/g, "\\'")}\`)">${isExpanded ? 'See More' : 'See Less'}</span>`;
            el.innerHTML = toggleBtn + (isExpanded ? `<ul><li>${textParts[0].split(' ').slice(0, 7).join(' ')}...</li></ul>` : `<ul>${textParts.map(p => `<li>${p.trim()}</li>`).join('')}</ul>`);
            el.setAttribute('data-expanded', !isExpanded);
        };

        // Fetch Data
        const urlParams = new URLSearchParams(window.location.search);
        const q = query(collection(db, "resource_metrics"), where("type", "==", urlParams.get('type') || ""), where("subject", "==", urlParams.get('subject') || ""), where("form", "==", urlParams.get('form') || ""));

        getDocs(q).then(snapshot => {
            const list = document.getElementById('fileList');
            snapshot.forEach(docSnap => {
                const file = docSnap.data();
                const id = docSnap.id;
                list.innerHTML += `
                    <div class="file-item">
                        <div class="file-name">${file.name}</div>
                        <div class="interaction-bar">
                            <span><i class="fas fa-eye"></i> ${file.views || 0}</span>
                            <span class="interact-btn" onclick="addComment('${id}')"><i class="fas fa-comment"></i> ${file.comments ? file.comments.length : 0}</span>
                        </div>
                        <div class="doc-summary" id="sum-${id}" data-expanded="false">
                            <span class="toggle-btn" onclick="toggleSummary('${id}', \`${(file.summary || "").replace(/'/g, "\\'")}\`)">See More</span>
                            <ul><li>${(file.summary || "").split(/[•\-\n]/)[0].split(' ').slice(0, 7).join(' ')}...</li></ul>
                        </div>
                        <div class="btn-group">
                            <button class="view-btn" onclick="incrementView('${id}');">View</button>
                            <a href="${file.url}" download class="download-btn">Download</a>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
