<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Stars Aimers | Resource Hub Vault</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #f57c00;
            --accent: #e65100;
            --bg-deep: #05080f;
            --card-bg: #0c121e;
            --input-bg: #05080f;
            --text: #ffffff;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --success: #10b981;
            --danger: #ef4444;
            --pdf-color: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(245, 124, 0, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(245, 124, 0, 0.03) 0%, transparent 40%);
        }

        .container { max-width: 900px; margin: 0 auto; position: relative; }

        .hub-header { text-align: center; margin-bottom: 40px; position: relative; }
        .hub-header i.main-icon { font-size: 3rem; color: var(--primary); margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(245, 124, 0, 0.3)); }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle-badge { display: inline-block; background: rgba(245, 124, 0, 0.1); border: 1px solid rgba(245, 124, 0, 0.2); color: var(--primary); padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .control-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .search-wrapper { position: relative; display: flex; align-items: center; margin-bottom: 20px; }
        .search-wrapper i { position: absolute; left: 20px; color: var(--text-dim); font-size: 1.1rem; }
        .search-bar { width: 100%; background: var(--input-bg); border: 1px solid var(--border); padding: 16px 20px 16px 55px; border-radius: 14px; color: white; font-size: 0.95rem; transition: 0.3s; }
        .search-bar:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(245, 124, 0, 0.1); }

        .filter-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; }
        .tabs-container { display: flex; gap: 8px; }
        .filter-tab { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-dim); padding: 10px 18px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .filter-tab:hover, .filter-tab.active { border-color: var(--primary); color: white; }
        .filter-tab.active { background: var(--primary); box-shadow: 0 4px 12px rgba(245, 124, 0, 0.25); }
        .metrics-counter { font-size: 0.8rem; color: var(--text-dim); font-weight: 600; }
        .metrics-counter span { color: var(--primary); font-weight: 800; }

        .resource-list { display: flex; flex-direction: column; gap: 15px; }
        .file-item { background: var(--card-bg); border: 1px solid var(--border); padding: 24px; border-radius: 18px; display: flex; flex-direction: column; gap: 16px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .file-item:hover { transform: translateY(-2px); border-color: rgba(245, 124, 0, 0.3); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .file-top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .file-meta-zone { display: flex; align-items: center; gap: 18px; max-width: 70%; }
        .file-icon-box { width: 48px; height: 48px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .text-details { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .file-name { font-weight: 700; font-size: 1.1rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-subtext { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }

        .doc-summary { font-size: 0.85rem; color: #cbd5e1; background: rgba(5, 8, 15, 0.4); padding: 12px 16px; border-radius: 10px; border-left: 3px solid var(--primary); line-height: 1.5; }
        .toggle-btn { color: var(--primary); cursor: pointer; font-weight: 700; margin-left: 5px; text-decoration: underline; }

        .viewer-overlay { position: fixed; inset: 0; background: rgba(5, 8, 15, 0.95); backdrop-filter: blur(15px); z-index: 2000; display: none; padding: 30px; }
        .viewer-overlay.active { display: block; }
        .viewer-window { width: 100%; height: 100%; background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .viewer-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .close-viewer-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: white; width: 40px; height: 40px; border-radius: 50%; display: pointer; }
        .viewer-iframe { width: 100%; height: 100%; border: none; }
        .msg-box { text-align: center; color: var(--text-dim); padding: 50px 0; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="hub-header">
            <i class="fas fa-box-archive main-icon"></i>
            <h1 id="pageTitle">Vault Core</h1>
            <div class="subtitle-badge" id="categoryBadge">Syncing Library...</div>
        </div>

        <div class="control-panel">
            <div class="search-wrapper">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="hubSearch" class="search-bar" placeholder="Search documents...">
            </div>
            <div class="filter-row">
                <div class="tabs-container">
                    <button class="filter-tab active" data-filter="all">All Content</button>
                    <button class="filter-tab" data-filter="notes">Notes</button>
                    <button class="filter-tab" data-filter="papers">Exam Papers</button>
                </div>
                <div class="metrics-counter">Inventory Count: <span id="itemCounter">0</span></div>
            </div>
        </div>

        <div id="fileList" class="resource-list"></div>
    </div>

    <div class="viewer-overlay" id="portalViewer">
        <div class="viewer-window">
            <div class="viewer-header">
                <h3 id="viewerDocName">Document</h3>
                <button class="close-viewer-btn" id="closePortalBtn"><i class="fas fa-xmark"></i></button>
            </div>
            <iframe id="viewerFrame" class="viewer-iframe" src=""></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
            authDomain: "high-stars-aimers-5972f.firebaseapp.com",
            projectId: "high-stars-aimers-5972f",
            storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
            messagingSenderId: "233345875942",
            appId: "1:233345875942:web:cf7610de84f0b2262ce027"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allFiles = [];

        window.toggleSummary = (id, fullText) => {
            const el = document.getElementById(`sum-${id}`);
            const isExpanded = el.getAttribute('data-expanded') === 'true';
            if (isExpanded) {
                el.innerHTML = `${fullText.substring(0, 120)}... <span class="toggle-btn" onclick="toggleSummary('${id}', \`${fullText.replace(/'/g, "\\'")}\`)">See More</span>`;
                el.setAttribute('data-expanded', 'false');
            } else {
                el.innerHTML = `${fullText} <span class="toggle-btn" onclick="toggleSummary('${id}', \`${fullText.replace(/'/g, "\\'")}\`)">See Less</span>`;
                el.setAttribute('data-expanded', 'true');
            }
        };

        const renderList = (data) => {
            const list = document.getElementById('fileList');
            list.innerHTML = data.map((file, i) => {
                const text = file.summary || "No description provided.";
                const isLong = text.length > 120;
                const display = isLong ? text.substring(0, 120) + "..." : text;
                return `
                    <div class="file-item">
                        <div class="file-top-row">
                            <div class="file-meta-zone">
                                <div class="file-icon-box"><i class="fas fa-file-pdf"></i></div>
                                <div class="text-details"><span class="file-name">${file.name}</span></div>
                            </div>
                            <button class="filter-tab" onclick="openViewer('${file.url}', '${file.name}')">View</button>
                        </div>
                        <div class="doc-summary" id="sum-${i}" data-expanded="false">
                            ${display}${isLong ? ` <span class="toggle-btn" onclick="toggleSummary('${i}', \`${text.replace(/'/g, "\\'")}\`)">See More</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('itemCounter').innerText = data.length;
        };

        window.openViewer = (url, name) => {
            document.getElementById('viewerDocName').innerText = name;
            document.getElementById('viewerFrame').src = url;
            document.getElementById('portalViewer').classList.add('active');
        };

        document.getElementById('closePortalBtn').onclick = () => {
            document.getElementById('portalViewer').classList.remove('active');
            document.getElementById('viewerFrame').src = "";
        };

        getDocs(collection(db, "resource_metrics")).then(snapshot => {
            snapshot.forEach(doc => allFiles.push(doc.data()));
            renderList(allFiles);
        });
    </script>
</body>
</html>
