<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Stars Aimers | Resource Hub Vault</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #f57c00;
            --bg-deep: #05080f;
            --card-bg: #0c121e;
            --text: #ffffff;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .file-item { background: var(--card-bg); border: 1px solid var(--border); padding: 24px; border-radius: 18px; margin-bottom: 20px; }
        .file-name { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 10px; }
        .doc-summary { font-size: 0.85rem; color: #cbd5e1; line-height: 1.6; }
        .doc-summary ul { list-style-type: disc; margin-left: 20px; margin-top: 8px; }
        .doc-summary li { margin-bottom: 4px; }
        .toggle-btn { color: var(--primary); cursor: pointer; font-weight: 700; margin-top: 10px; display: inline-block; text-decoration: underline; }
        .view-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        
        .viewer-overlay { position: fixed; inset: 0; background: rgba(5, 8, 15, 0.95); z-index: 2000; display: none; padding: 30px; }
        .viewer-overlay.active { display: block; }
        .viewer-window { width: 100%; height: 100%; background: var(--card-bg); display: flex; flex-direction: column; }
        .close-viewer-btn { align-self: flex-end; cursor: pointer; color: white; background: none; border: none; font-size: 1.5rem; padding: 10px; }
        .viewer-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="pageTitle">Vault Core</h1>
        <div id="fileList" class="resource-list"></div>
    </div>

    <div class="viewer-overlay" id="portalViewer">
        <div class="viewer-window">
            <button class="close-viewer-btn" id="closePortalBtn"><i class="fas fa-xmark"></i></button>
            <iframe id="viewerFrame" class="viewer-iframe"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
            authDomain: "high-stars-aimers-5972f.firebaseapp.com",
            projectId: "high-stars-aimers-5972f",
            storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
            messagingSenderId: "233345875942",
            appId: "1:233345875942:web:cf7610de84f0b2262ce027"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');
        const subjectParam = urlParams.get('subject');
        const formParam = urlParams.get('form')?.replace(/_/g, ' ');

        document.getElementById('pageTitle').innerText = `${subjectParam || 'Vault'} - ${formParam || ''}`;

        const formatSummary = (text, isExpanded) => {
            const parts = text.split(/[•\-\n]/).filter(p => p.trim().length > 0);
            if (!isExpanded && parts.length > 2) {
                return `<ul>${parts.slice(0, 2).map(p => `<li>${p.trim()}</li>`).join('')}</ul>`;
            }
            return `<ul>${parts.map(p => `<li>${p.trim()}</li>`).join('')}</ul>`;
        };

        window.toggleSummary = (id, fullText) => {
            const el = document.getElementById(`sum-${id}`);
            const isExpanded = el.getAttribute('data-expanded') === 'true';
            
            if (isExpanded) {
                el.innerHTML = formatSummary(fullText, false) + `<span class="toggle-btn" onclick="toggleSummary('${id}', \`${fullText.replace(/'/g, "\\'")}\`)">See More</span>`;
                el.setAttribute('data-expanded', 'false');
            } else {
                el.innerHTML = formatSummary(fullText, true) + `<span class="toggle-btn" onclick="toggleSummary('${id}', \`${fullText.replace(/'/g, "\\'")}\`)">See Less</span>`;
                el.setAttribute('data-expanded', 'true');
            }
        };

        window.openViewer = (url) => {
            document.getElementById('viewerFrame').src = url;
            document.getElementById('portalViewer').classList.add('active');
        };

        document.getElementById('closePortalBtn').onclick = () => {
            document.getElementById('portalViewer').classList.remove('active');
            document.getElementById('viewerFrame').src = "";
        };

        const q = query(
            collection(db, "resource_metrics"),
            where("type", "==", typeParam),
            where("subject", "==", subjectParam),
            where("form", "==", formParam)
        );

        getDocs(q).then(snapshot => {
            const list = document.getElementById('fileList');
            if (snapshot.empty) {
                list.innerHTML = "<p>No resources found for this category.</p>";
                return;
            }
            snapshot.forEach((doc, i) => {
                const file = doc.data();
                const text = file.summary || "No description provided.";
                const hasMore = text.split(/[•\-\n]/).filter(p => p.trim().length > 0).length > 2;
                
                list.innerHTML += `
                    <div class="file-item">
                        <span class="file-name">${file.name}</span>
                        <div class="doc-summary" id="sum-${i}" data-expanded="false">
                            ${formatSummary(text, false)}${hasMore ? `<span class="toggle-btn" onclick="toggleSummary('${i}', \`${text.replace(/'/g, "\\'")}\`)">See More</span>` : ''}
                        </div>
                        <button class="view-btn" onclick="openViewer('${file.url}')">View Document</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
