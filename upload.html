<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal - High Stars Aimers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-color: #2a2e92;
  --secondary-color: #00f0ff;
  --background-dark: #0a0f1f;
  --card-background: rgba(35, 40, 60, 0.8);
  --text-light: #e0e0e0;
  --border-color: rgba(0, 240, 255, 0.2);
  --danger: #dc2626;
  --radius: 12px;
}

html, body { margin:0; padding:0; font-family:'Inter', sans-serif; background-color: var(--background-dark); color: var(--text-light); }

.nav-container {
    display: flex;
    justify-content: center;
    background: #151a2f;
    border-bottom: 2px solid var(--secondary-color);
    position: sticky; top: 0; z-index: 1000;
}
.nav-tab {
    padding: 15px 30px;
    cursor: pointer;
    color: var(--text-light);
    font-weight: 600;
    transition: 0.3s;
    border-bottom: 3px solid transparent;
}
.nav-tab.active {
    color: var(--secondary-color);
    border-bottom: 3px solid var(--secondary-color);
}
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

.header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; }
.header a { color:white; text-decoration:none; }

main { padding:30px; max-width:700px; margin:0 auto; }
h2 { color: var(--secondary-color); margin-bottom:20px; text-align:center; }
.upload-card { background: var(--card-background); padding:25px 30px; border-radius:10px; border:1px solid var(--border-color); }
label { display:block; margin-top:15px; margin-bottom:5px; color: var(--secondary-color); font-weight:600; }
select, input[type="file"], input[type="text"] { width:100%; padding:10px; background-color:#151a2f; border:1px solid var(--border-color); color:var(--text-light); border-radius:6px; margin-bottom:15px; box-sizing: border-box; }
button { width:100%; padding:12px; background-color: var(--secondary-color); color:#000; font-weight:bold; cursor:pointer; border:none; border-radius:6px; transition:0.3s; }
button:hover:not(:disabled) { transform:scale(1.01); filter: brightness(1.1); }

.progress-container { width: 100%; background-color: #151a2f; border-radius: 4px; height: 8px; margin-bottom: 15px; overflow: hidden; }
.progress-bar { width: 0%; height: 100%; background-color: var(--secondary-color); transition: width 0.3s; }

.file-card {
  background: var(--card-background);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 0.75rem;
  display: flex;
  justify-content: space-between; align-items: center;
}
.file-info { display: flex; align-items: center; gap: 1rem; }
.file-icon { color: var(--secondary-color); font-size: 1.5rem; }
.file-name { font-weight: 500; font-size: 0.95rem; }
.file-path { font-size: 0.75rem; color: #aaa; }
.btn-delete {
  background: rgba(220, 38, 38, 0.1);
  color: #ff6b6b;
  width: 35px; height: 35px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; border: none; cursor: pointer;
}
.btn-delete:hover { background: var(--danger); color: white; }

.status-box { padding: 10px; border-radius: 6px; margin-top: 15px; text-align: center; font-size: 14px; }
.status-info { background-color: rgba(0, 240, 255, 0.1); border: 1px solid var(--secondary-color); }
.status-success { background-color: rgba(0, 255, 0, 0.1); border: 1px solid limegreen; color: #51cf66; }

.footer { text-align:center; padding:20px; color:#aaa; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="nav-container">
    <div class="nav-tab active" onclick="openTab('upload-tab')"><i class="fas fa-upload"></i> Upload Portal</div>
    <div class="nav-tab" onclick="openTab('manager-tab')"><i class="fas fa-folder-open"></i> File Manager</div>
</div>

<div class="header">
  <h1 style="margin-left: 20px;">High Stars Aimers</h1>
  <a href="index.html" style="margin-right: 20px;"><i class="fas fa-arrow-left"></i> Home</a>
</div>

<div id="upload-tab" class="tab-content active">
  <main>
    <h2>Admin Upload Portal</h2>
    <div class="upload-card">
      <form id="uploadForm">
        <label>Document Title (Appears as name):</label>
        <input type="text" id="title" placeholder="e.g., Biology Paper 1" required>

        <label>Category:</label>
        <select id="uploadType">
          <option value="revision_papers">Revision Papers</option>
          <option value="subject_notes">Subject Notes</option>
        </select>

        <label>Subject:</label>
        <select id="subject">
          <option value="Mathematics">Mathematics</option>
          <option value="English">English</option>
          <option value="Kiswahili">Kiswahili</option>
          <option value="Chemistry">Chemistry</option>
          <option value="Physics">Physics</option>
          <option value="Biology">Biology</option>
          <option value="Geography">Geography</option>
          <option value="History">History</option>
          <option value="CRE">CRE</option>
          <option value="Business Studies">Business Studies</option>
          <option value="Agriculture">Agriculture</option>
          <option value="Computer Studies">Computer Studies</option>
        </select>

        <label>Form:</label>
        <select id="form">
          <option value="Form 1">Form 1</option>
          <option value="Form 2">Form 2</option>
          <option value="Form 3">Form 3</option>
          <option value="Form 4">Form 4</option>
        </select>

        <label>PDF File:</label>
        <input type="file" id="file" accept=".pdf" required>

        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <p id="uploadStatus" class="status-box status-info">Checking Connection...</p>
        <button type="submit" id="uploadBtn" disabled>Upload Resource</button>
      </form>
    </div>
  </main>
</div>

<div id="manager-tab" class="tab-content">
  <div style="max-width: 800px; margin: 0 auto; padding: 20px;">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>Storage Explorer</h3>
        <button id="refreshBtn" style="width: auto; padding: 8px 15px;"><i class="fas fa-sync"></i> Refresh</button>
    </div>

    <div style="margin-bottom: 20px; background: var(--card-background); padding: 15px; border-radius: 8px;">
        <label>Filter View:</label>
        <select id="mgrType" onchange="fetchStorageFiles()">
            <option value="revision_papers">Revision Papers</option>
            <option value="subject_notes">Subject Notes</option>
        </select>
        <p id="fileCount" style="font-size: 0.8rem; color: var(--secondary-color);">Scanning folders...</p>
    </div>

    <div id="fileList">
      <div class="status-box status-info">Open this tab to view files.</div>
    </div>
  </div>
</div>

<footer class="footer">&copy; 2026 High Stars Aimers.</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, listAll, deleteObject } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
      authDomain: "high-stars-aimers-5972f.firebaseapp.com",
      projectId: "high-stars-aimers-5972f",
      storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
      messagingSenderId: "233345875942",
      appId: "1:233345875942:web:cf7610de84f0b2262ce027"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const storage = getStorage(app);

    const uploadForm = document.getElementById("uploadForm");
    const progressBar = document.getElementById("progressBar");
    const uploadStatus = document.getElementById("uploadStatus");
    const uploadButton = document.getElementById("uploadBtn");
    const fileListElement = document.getElementById('fileList');

    // Tab Logic
    window.openTab = (tabId) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'manager-tab') fetchStorageFiles();
    };

    // Auth
    signInAnonymously(auth).catch(e => console.error("Auth Error", e));
    onAuthStateChanged(auth, (user) => {
        if (user) {
            uploadStatus.textContent = "Admin Connected.";
            uploadStatus.className = "status-box status-success";
            uploadButton.disabled = false;
        }
    });

    // UPLOAD LOGIC
    uploadForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const title = document.getElementById("title").value;
        const type = document.getElementById("uploadType").value;
        const subject = document.getElementById("subject").value;
        const form = document.getElementById("form").value;
        const file = document.getElementById("file").files[0];

        uploadButton.disabled = true;
        const storagePath = `${type}/${subject}/${form}/${title}.pdf`;
        const storageRef = ref(storage, storagePath);
        const uploadTask = uploadBytesResumable(storageRef, file);

        uploadTask.on('state_changed', 
            (snap) => progressBar.style.width = (snap.bytesTransferred / snap.totalBytes) * 100 + "%",
            (err) => { alert("Upload failed: " + err.message); uploadButton.disabled = false; },
            () => {
                alert("File Uploaded Successfully!");
                uploadForm.reset();
                progressBar.style.width = "0%";
                uploadButton.disabled = false;
                if(document.getElementById('manager-tab').classList.contains('active')) fetchStorageFiles();
            }
        );
    });

    // FILE MANAGER LOGIC (READS DIRECTLY FROM STORAGE)
    async function fetchStorageFiles() {
        const rootCategory = document.getElementById('mgrType').value;
        fileListElement.innerHTML = '<div class="status-box status-info">Scanning Storage...</div>';
        let totalFiles = 0;
        fileListElement.innerHTML = '';

        const subjects = ["Mathematics", "English", "Kiswahili", "Chemistry", "Physics", "Biology", "Geography", "History", "CRE", "Business Studies", "Agriculture", "Computer Studies"];
        const forms = ["Form 1", "Form 2", "Form 3", "Form 4"];

        for (const sub of subjects) {
            for (const frm of forms) {
                const folderPath = `${rootCategory}/${sub}/${frm}`;
                const folderRef = ref(storage, folderPath);

                try {
                    const res = await listAll(folderRef);
                    res.items.forEach((item) => {
                        totalFiles++;
                        const card = document.createElement('div');
                        card.className = 'file-card';
                        card.innerHTML = `
                          <div class="file-info">
                            <i class="fas fa-file-pdf file-icon"></i>
                            <div>
                              <div class="file-name">${item.name}</div>
                              <div class="file-path">${sub} | ${frm}</div>
                            </div>
                          </div>
                          <button class="btn-delete" onclick="deleteFile('${item.fullPath}')">
                            <i class="fas fa-trash-alt"></i>
                          </button>
                        `;
                        fileListElement.appendChild(card);
                    });
                } catch (e) { /* Folder likely empty, skip */ }
            }
        }
        document.getElementById('fileCount').innerText = `${totalFiles} items found in ${rootCategory.replace('_',' ')}`;
        if(totalFiles === 0) fileListElement.innerHTML = '<div class="status-box">No files found.</div>';
    }

    // DELETE LOGIC
    window.deleteFile = async (path) => {
        if(confirm("Delete this file permanently?")) {
            try {
                await deleteObject(ref(storage, path));
                fetchStorageFiles();
            } catch (e) { alert("Error deleting: " + e.message); }
        }
    };

    document.getElementById('refreshBtn').onclick = fetchStorageFiles;

</script>
</body>
</html>
