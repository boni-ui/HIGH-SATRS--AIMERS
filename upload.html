<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal - High Stars Aimers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-color: #2a2e92;
  --secondary-color: #00f0ff;
  --background-dark: #0a0f1f;
  --card-background: rgba(35, 40, 60, 0.8);
  --text-light: #e0e0e0;
  --border-color: rgba(0, 240, 255, 0.2);
  --danger: #dc2626;
  --radius: 12px;
}

html, body { margin:0; padding:0; font-family:'Inter', 'Segoe UI', sans-serif; background-color: var(--background-dark); color: var(--text-light); }

/* Navigation Tabs */
.nav-container {
    display: flex;
    justify-content: center;
    background: #151a2f;
    border-bottom: 2px solid var(--secondary-color);
    position: sticky;
    top: 0;
    z-index: 1000;
}
.nav-tab {
    padding: 15px 30px;
    cursor: pointer;
    color: var(--text-light);
    font-weight: 600;
    transition: 0.3s;
    border-bottom: 3px solid transparent;
}
.nav-tab.active {
    color: var(--secondary-color);
    border-bottom: 3px solid var(--secondary-color);
}
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

/* Header Styling */
.header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background-color: var(--background-dark); }
.header a { color:white; text-decoration:none; }

/* Upload Section Styling */
main { padding:30px; max-width:700px; margin:0 auto; }
h2 { color: var(--secondary-color); margin-bottom:20px; text-align:center; }
.upload-card { background: var(--card-background); padding:25px 30px; border-radius:10px; border:1px solid var(--border-color); box-shadow:0 4px 12px rgba(0,240,255,0.1); }
label { display:block; margin-top:15px; margin-bottom:5px; color: var(--secondary-color); font-weight:600; }
select, input[type="file"], input[type="text"] { width:100%; padding:10px; background-color:#151a2f; border:1px solid var(--border-color); color:var(--text-light); border-radius:6px; margin-bottom:15px; font-size:16px; }
button { width:100%; padding:10px; background-color: var(--secondary-color); color:#000; font-weight:bold; cursor:pointer; border:none; transition:0.3s; border-radius:6px; margin-bottom:15px; font-size:16px; }
button:hover:not(:disabled) { background-color:#03e3f0; transform:scale(1.02); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Progress Bar */
.progress-container { width: 100%; background-color: #151a2f; border-radius: 4px; margin-top: 10px; }
.progress-bar { width: 0%; height: 8px; background-color: var(--secondary-color); border-radius: 4px; transition: width 0.3s; }

/* Dashboard / File Manager Styling */
.container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
.stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.file-card {
  background: var(--card-background);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.file-info { display: flex; align-items: center; gap: 1rem; }
.file-icon { width: 40px; height: 40px; background: rgba(0, 240, 255, 0.1); color: var(--secondary-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.file-name { font-weight: 500; font-size: 0.95rem; word-break: break-all; }
.file-path { font-size: 0.75rem; color: #aaa; }
.btn-delete {
  background: rgba(220, 38, 38, 0.1);
  color: #ff6b6b;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  cursor: pointer;
}
.btn-delete:hover { background: var(--danger); color: white; }
.loading-spinner { text-align: center; padding: 3rem; color: #aaa; }

/* Status Boxes */
.status-box { padding: 10px; border-radius: 6px; margin-top: 15px; text-align: center; font-size: 14px; }
.status-info { background-color: rgba(0, 240, 255, 0.1); border: 1px solid var(--secondary-color); }
.status-error { background-color: rgba(255, 0, 0, 0.1); border: 1px solid red; color: #ff6b6b; }
.status-success { background-color: rgba(0, 255, 0, 0.1); border: 1px solid limegreen; color: #51cf66; }

.footer { text-align:center; padding:20px; border-top:1px solid var(--border-color); color:#aaa; margin-top:40px; }
</style>
</head>
<body>

<div class="nav-container">
    <div class="nav-tab active" onclick="openTab('upload-tab')"><i class="fas fa-upload"></i> Upload File</div>
    <div class="nav-tab" onclick="openTab('manager-tab')"><i class="fas fa-folder-open"></i> File Manager</div>
</div>

<div class="header">
  <h1>High Stars Aimers</h1>
  <a href="index.html"><i class="fas fa-arrow-left"></i> Back Home</a>
</div>

<div id="upload-tab" class="tab-content active">
  <main>
    <h2>Admin Upload Portal</h2>
    <div class="upload-card">
      <form id="uploadForm">
        <label for="title">Document Title:</label>
        <input type="text" id="title" placeholder="e.g., Mathematics Paper 1 Revision" required>

        <label for="uploadType">Folder Category:</label>
        <select id="uploadType" required>
          <option value="revision_papers">Revision Papers</option>
          <option value="subject_notes">Subject Notes</option>
        </select>

        <label for="subject">Select Subject:</label>
        <select id="subject" required>
          <option value="" disabled selected>-- Select Subject --</option>
          <option value="Mathematics">Mathematics</option>
          <option value="English">English</option>
          <option value="Kiswahili">Kiswahili</option>
          <option value="Chemistry">Chemistry</option>
          <option value="Physics">Physics</option>
          <option value="Biology">Biology</option>
          <option value="Geography">Geography</option>
          <option value="History">History</option>
          <option value="CRE">CRE</option>
          <option value="Business Studies">Business Studies</option>
          <option value="Agriculture">Agriculture</option>
          <option value="Computer Studies">Computer Studies</option>
        </select>

        <label for="form">Select Form:</label>
        <select id="form" required>
          <option value="Form 1">Form 1</option>
          <option value="Form 2">Form 2</option>
          <option value="Form 3">Form 3</option>
          <option value="Form 4">Form 4</option>
        </select>

        <label for="file">Choose PDF File:</label>
        <input type="file" id="file" accept=".pdf" required>

        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <p id="uploadStatus" class="status-box status-info">Checking connection...</p>
        <button type="submit" id="uploadBtn" disabled>Upload to Firebase</button>
      </form>
    </div>
  </main>
</div>

<div id="manager-tab" class="tab-content">
  <div class="container">
    <div class="stats-bar">
      <div>
        <h3 id="folderTitle">Firebase Storage Explorer</h3>
        <p id="fileCount" style="font-size: 0.85rem; color: #aaa;">Select a category to scan...</p>
      </div>
      <button class="btn" style="background:var(--secondary-color); color:black; border-radius:8px; padding:8px 15px;" id="refreshBtn">
        <i class="fas fa-sync-alt"></i> Refresh List
      </button>
    </div>

    <div style="margin-bottom: 20px;">
        <label>View Folder:</label>
        <select id="viewFolder">
            <option value="revision_papers">Revision Papers</option>
            <option value="subject_notes">Subject Notes</option>
        </select>
    </div>

    <div id="fileList">
      <div class="loading-spinner">
        <p>Please log in or select a category to view files.</p>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  &copy; 2026 High Stars Aimers. Admin Access Only.
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, listAll, deleteObject } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
      authDomain: "high-stars-aimers-5972f.firebaseapp.com",
      projectId: "high-stars-aimers-5972f",
      storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
      messagingSenderId: "233345875942",
      appId: "1:233345875942:web:cf7610de84f0b2262ce027"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // DOM Elements
    const uploadForm = document.getElementById("uploadForm");
    const progressBar = document.getElementById("progressBar");
    const uploadStatus = document.getElementById("uploadStatus");
    const uploadButton = document.getElementById("uploadBtn");
    const fileListElement = document.getElementById('fileList');
    const fileCountElement = document.getElementById('fileCount');
    const viewFolderSelect = document.getElementById('viewFolder');
    const refreshBtn = document.getElementById('refreshBtn');

    // Tab Logic
    window.openTab = (tabId) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'manager-tab') listFiles();
    };

    const showStatus = (msg, type) => {
        uploadStatus.textContent = msg;
        uploadStatus.className = `status-box status-${type}`;
    };

    signInAnonymously(auth).catch(e => showStatus("Connection Error: " + e.message, "error"));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            showStatus("System Ready. Authenticated.", "success");
            uploadButton.disabled = false;
            listFiles();
        }
    });

    // UPLOAD LOGIC
    uploadForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const title = document.getElementById("title").value;
        const type = document.getElementById("uploadType").value;
        const subject = document.getElementById("subject").value;
        const form = document.getElementById("form").value;
        const file = document.getElementById("file").files[0];

        if (!file) return;
        uploadButton.disabled = true;
        const storagePath = `${type}/${subject}/${form}/${title}.pdf`;
        const storageRef = ref(storage, storagePath);
        const uploadTask = uploadBytesResumable(storageRef, file);

        uploadTask.on('state_changed', 
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                progressBar.style.width = progress + "%";
                showStatus(`Uploading... ${Math.round(progress)}%`, "info");
            }, 
            (error) => {
                showStatus("Upload Failed: " + error.message, "error");
                uploadButton.disabled = false;
            }, 
            async () => {
                try {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                    const docId = Date.now().toString();
                    await setDoc(doc(db, "papers", docId), {
                        title: title,
                        category: type,
                        subject: subject,
                        form: form,
                        url: downloadURL,
                        storagePath: storagePath, // Storing path to make deletion easier
                        timestamp: new Date().toISOString()
                    });
                    showStatus("✅ Upload Successful!", "success");
                    uploadForm.reset();
                    setTimeout(() => { progressBar.style.width = "0%"; }, 2000);
                    if(document.getElementById('manager-tab').classList.contains('active')) listFiles();
                } catch (err) {
                    showStatus("Database record failed: " + err.message, "error");
                } finally {
                    uploadButton.disabled = false;
                }
            }
        );
    });

    // FILE MANAGER LOGIC
    async function listFiles() {
        const folder = viewFolderSelect.value;
        fileListElement.innerHTML = `<div class="loading-spinner"><i class="fas fa-circle-notch fa-spin fa-2x"></i><p>Scanning ${folder}...</p></div>`;
        
        try {
            // We fetch from Firestore to get clean metadata
            const q = query(collection(db, "papers"), where("category", "==", folder));
            const querySnapshot = await getDocs(q);
            
            fileListElement.innerHTML = '';
            fileCountElement.innerText = `${querySnapshot.size} records found in ${folder}`;

            if (querySnapshot.empty) {
                fileListElement.innerHTML = `<div style="text-align:center; padding: 3rem; color: #aaa;"><p>No files found in this category.</p></div>`;
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                  <div class="file-info">
                    <div class="file-icon"><i class="fas fa-file-pdf"></i></div>
                    <div>
                      <div class="file-name">${data.title}</div>
                      <div class="file-path">${data.subject} - ${data.form}</div>
                    </div>
                  </div>
                  <button class="btn-delete" data-id="${docSnap.id}" data-path="${data.storagePath || ''}" title="Delete">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                `;
                fileListElement.appendChild(card);
            });

            // Add delete events
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.onclick = () => deleteFile(btn.getAttribute('data-id'), btn.getAttribute('data-path'));
            });

        } catch (error) {
            fileListElement.innerHTML = `<p style="color:red; text-align:center;">Error: ${error.message}</p>`;
        }
    }

    async function deleteFile(docId, storagePath) {
        if (confirm("Delete this file permanently?")) {
            try {
                // 1. Delete from Firestore
                await deleteDoc(doc(db, "papers", docId));
                // 2. Delete from Storage if path exists
                if(storagePath) {
                    const fileRef = ref(storage, storagePath);
                    await deleteObject(fileRef);
                }
                listFiles(); 
            } catch (error) {
                alert("Deletion error: " + error.message);
            }
        }
    }

    refreshBtn.addEventListener('click', listFiles);
    viewFolderSelect.addEventListener('change', listFiles);

</script>
</body>
</html>
