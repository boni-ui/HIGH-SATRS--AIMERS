<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal | High Stars Aimers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-color: #f57c00;
  --secondary-color: #ffb347;
  --background-dark: #05080f;
  --card-background: #0c121e;
  --input-bg: #05080f;
  --text-light: #e0e0e0;
  --border-color: rgba(255, 179, 71, 0.15);
  --danger: #ef4444;
  --radius: 12px;
}

html, body { margin:0; padding:0; font-family:'Plus Jakarta Sans', sans-serif; background-color: var(--background-dark); color: var(--text-light); }

#login-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--background-dark);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
}
.login-card {
    background: var(--card-background);
    padding: 40px; border-radius: 15px; border: 1px solid var(--border-color);
    width: 90%; max-width: 400px; text-align: center;
}

#portal-content { display: none; }

.nav-container {
    display: flex; justify-content: center;
    background: var(--card-background); border-bottom: 2px solid var(--border-color);
    position: sticky; top: 0; z-index: 1000;
}
.nav-tab {
    padding: 15px 30px; cursor: pointer; color: var(--text-light);
    font-weight: 600; transition: 0.3s; border-bottom: 3px solid transparent;
}
.nav-tab.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); }

.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

.header { display:flex; justify-content:space-between; align-items:center; padding:15px 25px; }
.header h1 { font-size: 1.4rem; margin: 0; color: var(--primary-color); }

main { padding:30px; max-width:700px; margin:0 auto; }
h2 { color: var(--primary-color); margin-bottom:20px; text-align:center; }
.upload-card { background: var(--card-background); padding:25px 30px; border-radius:10px; border:1px solid var(--border-color); }

label { display:block; margin-top:15px; margin-bottom:5px; color: var(--secondary-color); font-weight:600; font-size: 0.9rem; }
input, select { width:100%; padding:12px; background-color: var(--input-bg); border:1px solid var(--border-color); color:var(--text-light); border-radius:6px; margin-bottom:15px; box-sizing: border-box; }

button { width:100%; padding:12px; background-color: var(--primary-color); color:#fff; font-weight:bold; cursor:pointer; border:none; border-radius:6px; transition:0.2s; }
button:hover { transform:scale(1.01); filter: brightness(1.1); }
.btn-logout { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; width: auto; padding: 5px 15px; font-size: 0.8rem; }

.progress-container { width: 100%; background-color: var(--input-bg); border-radius: 4px; height: 8px; margin-bottom: 15px; overflow: hidden; }
.progress-bar { width: 0%; height: 100%; background-color: var(--primary-color); transition: width 0.3s; }

.file-card {
  background: var(--card-background); border: 1px solid var(--border-color);
  border-radius: var(--radius); padding: 1rem; margin-bottom: 0.75rem;
  display: flex; justify-content: space-between; align-items: center;
}
.file-info { display: flex; align-items: center; gap: 1rem; }
.file-icon { color: var(--primary-color); font-size: 1.5rem; }
.btn-delete { background: rgba(220, 38, 38, 0.1); color: #ff6b6b; width: 35px; height: 35px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.status-box { padding: 10px; border-radius: 6px; margin-top: 15px; text-align: center; font-size: 14px; }
.status-info { background-color: rgba(245, 124, 0, 0.1); border: 1px solid var(--border-color); }

.footer { text-align:center; padding:20px; color:#aaa; font-size: 0.8rem; }
</style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-user-shield fa-3x" style="color: var(--primary-color); margin-bottom: 20px;"></i>
        <h2>Admin Login</h2>
        <input type="email" id="loginEmail" placeholder="Admin Email" required>
        <input type="password" id="loginPass" placeholder="Password" required>
        <button id="loginBtn">Unlock Portal</button>
        <p id="loginError" style="color: #ff6b6b; font-size: 0.8rem; margin-top: 10px;"></p>
    </div>
</div>

<div id="portal-content">
    <div class="nav-container">
        <div class="nav-tab active" onclick="openTab('upload-tab')"><i class="fas fa-upload"></i> Upload Portal</div>
        <div class="nav-tab" onclick="openTab('manager-tab')"><i class="fas fa-folder-open"></i> File Manager</div>
    </div>

    <div class="header">
      <h1>High Stars Aimers Admin</h1>
      <div>
          <a href="index.html" style="margin-right: 15px; color: var(--primary-color);"><i class="fas fa-home"></i></a>
          <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div id="upload-tab" class="tab-content active">
      <main>
        <h2>Upload Resource</h2>
        <div class="upload-card">
          <form id="uploadForm">
            <label>Document Title:</label>
            <input type="text" id="title" placeholder="e.g., Mathematics Form 3 Exam" required>

            <label>Optional Document Summary/Overview:</label>
            <input type="text" id="docSummaryInput" placeholder="Write a short summary or leave blank for default summary...">

            <label>Category:</label>
            <select id="uploadType">
              <option value="revision_papers">Revision Papers</option>
              <option value="subject_notes">Subject Notes</option>
            </select>

            <label>Subject:</label>
            <select id="subject">
              <option value="Mathematics">Mathematics</option>
              <option value="English">English</option>
              <option value="Kiswahili">Kiswahili</option>
              <option value="Chemistry">Chemistry</option>
              <option value="Physics">Physics</option>
              <option value="Biology">Biology</option>
              <option value="Geography">Geography</option>
              <option value="History">History</option>
              <option value="CRE">CRE</option>
              <option value="Business Studies">Business Studies</option>
              <option value="Agriculture">Agriculture</option>
              <option value="Computer Studies">Computer Studies</option>
            </select>

            <label>Form:</label>
            <select id="form">
              <option value="Form 1">Form 1</option>
              <option value="Form 2">Form 2</option>
              <option value="Form 3">Form 3</option>
              <option value="Form 4">Form 4</option>
            </select>

            <label>PDF File:</label>
            <input type="file" id="file" accept=".pdf" required>

            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <p id="uploadStatus" class="status-box status-info">Ready for upload.</p>
            <button type="submit" id="uploadBtn">Upload to Storage</button>
          </form>
        </div>
      </main>
    </div>

    <div id="manager-tab" class="tab-content">
      <div style="max-width: 800px; margin: 0 auto; padding: 20px;">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Storage Explorer</h3>
            <button id="refreshBtn" style="width: auto; padding: 8px 15px;"><i class="fas fa-sync"></i> Refresh</button>
        </div>
        <div style="margin-bottom: 20px; background: var(--card-background); padding: 15px; border-radius: 8px;">
            <label>Filter View:</label>
            <select id="mgrType" onchange="fetchStorageFiles()">
                <option value="revision_papers">Revision Papers</option>
                <option value="subject_notes">Subject Notes</option>
            </select>
            <p id="fileCount" style="font-size: 0.8rem; color: var(--primary-color);">Scanning...</p>
        </div>
        <div id="fileList"></div>
      </div>
    </div>

    <footer class="footer">&copy; 2026 High Stars Aimers. Admin Panel.</footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, listAll, deleteObject } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";
    import { getFirestore, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
      authDomain: "high-stars-aimers-5972f.firebaseapp.com",
      projectId: "high-stars-aimers-5972f",
      storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
      messagingSenderId: "233345875942",
      appId: "1:233345875942:web:cf7610de84f0b2262ce027"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const db = getFirestore(app);

    const loginOverlay = document.getElementById('login-overlay');
    const portalContent = document.getElementById('portal-content');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const uploadForm = document.getElementById("uploadForm");

    loginBtn.onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const errorMsg = document.getElementById('loginError');
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (err) {
            errorMsg.innerText = "Invalid Admin Credentials.";
        }
    };

    const ADMIN_EMAIL = "bonimbugua13@gmail.com";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === ADMIN_EMAIL) {
                loginOverlay.style.display = 'none';
                portalContent.style.display = 'block';
            } else {
                alert("Unauthorized Access!");
                signOut(auth);
            }
        } else {
            loginOverlay.style.display = 'flex';
            portalContent.style.display = 'none';
        }
    });

    logoutBtn.onclick = () => signOut(auth);

    window.openTab = (tabId) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(window.event) window.event.currentTarget.classList.add('active');
        if(tabId === 'manager-tab') fetchStorageFiles();
    };

    uploadForm.onsubmit = async (e) => {
        e.preventDefault();
        let title = document.getElementById("title").value.trim();
        const customSummary = document.getElementById("docSummaryInput").value.trim();
        const type = document.getElementById("uploadType").value;
        const subject = document.getElementById("subject").value;
        const form = document.getElementById("form").value;
        const file = document.getElementById("file").files[0];
        const pBar = document.getElementById("progressBar");
        const statusBox = document.getElementById("uploadStatus");

        if(!title.toLowerCase().endsWith('.pdf')) {
            title += ".pdf";
        }

        statusBox.innerText = "Initializing upload task...";
        const storagePath = `${type}/${subject}/${form}/${title}`;
        const storageRef = ref(storage, storagePath);
        const uploadTask = uploadBytesResumable(storageRef, file);

        uploadTask.on('state_changed', 
            (snap) => {
                const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
                pBar.style.width = pct + "%";
                statusBox.innerText = `Uploading bytes to Storage: ${pct}%`;
            },
            (err) => {
                console.error("Storage Error:", err);
                statusBox.innerText = "Upload Error: " + err.message;
                alert("Upload Error: " + err.message);
            },
            async () => {
                try {
                    statusBox.innerText = "Fetching download URL link...";
                    const downloadURL = await getDownloadURL(storageRef);
                    
                    statusBox.innerText = "Writing complete metrics to Firestore...";
                    
                    const docId = btoa(unescape(encodeURIComponent(title))).replace(/=/g, '');
                    const docRef = doc(db, "resource_metrics", docId);
                    
                    // Added type, subject, form, and url so the resource view filter system can read them
                    await setDoc(docRef, {
                        name: title,
                        url: downloadURL,
                        type: type,
                        subject: subject,
                        form: form,
                        downloads: 0,
                        likes: 0,
                        summary: customSummary || "Syllabus revision companion text uploaded for High Stars Aimers performance objectives.",
                        comments: []
                    });

                    statusBox.innerText = "Success! Asset fully synchronized.";
                    alert("Upload Complete! Storage and Database successfully initialized.");
                    uploadForm.reset();
                    pBar.style.width = "0%";
                    setTimeout(() => { statusBox.innerText = "Ready for upload."; }, 3000);
                } catch(firestoreError) {
                    console.error("Database Alignment Error:", firestoreError);
                    statusBox.innerText = "Database Error: " + firestoreError.message;
                    alert("Storage file pushed, but structured data fields generation failed: " + firestoreError.message);
                }
            }
        );
    };

    async function fetchStorageFiles() {
        const listEl = document.getElementById('fileList');
        const type = document.getElementById('mgrType').value;
        listEl.innerHTML = '<p class="status-box status-info">Scanning Active Folders...</p>';
        let count = 0;
        
        const subjects = ["Mathematics", "English", "Kiswahili", "Chemistry", "Physics", "Biology", "Geography", "History", "CRE", "Business Studies", "Agriculture", "Computer Studies"];
        const forms = ["Form 1", "Form 2", "Form 3", "Form 4"];

        listEl.innerHTML = '';
        for (const sub of subjects) {
            for (const frm of forms) {
                try {
                    const res = await listAll(ref(storage, `${type}/${sub}/${frm}`));
                    res.items.forEach(item => {
                        count++;
                        const card = document.createElement('div');
                        card.className = 'file-card';
                        card.innerHTML = `
                            <div class="file-info">
                                <i class="fas fa-file-pdf file-icon"></i>
                                <div>
                                    <div class="file-name">${item.name}</div>
                                    <div class="file-path">${sub} | ${frm}</div>
                                </div>
                            </div>
                            <button class="btn-delete" onclick="window.del('${item.fullPath.replace(/'/g, "\\'")}', '${item.name.replace(/'/g, "\\'")}')"><i class="fas fa-trash"></i></button>
                        `;
                        listEl.appendChild(card);
                    });
                } catch (e) {}
            }
        }
        document.getElementById('fileCount').innerText = `${count} active assets discovered.`;
    }

    window.del = async (storagePath, filename) => {
        if(confirm("Delete file permanently from Cloud Storage and database?")) {
            try {
                await deleteObject(ref(storage, storagePath));
                const docId = btoa(unescape(encodeURIComponent(filename))).replace(/=/g, '');
                await deleteDoc(doc(db, "resource_metrics", docId));
                fetchStorageFiles();
            } catch(e) {
                alert("Error executing clean up process.");
            }
        }
    };

    document.getElementById('refreshBtn').onclick = fetchStorageFiles;
</script>
</body>
</html>
