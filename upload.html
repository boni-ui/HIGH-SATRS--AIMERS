<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Super Portal | High Stars Aimers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        /* Custom scrollbar and theme matching your active layout */
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .accent-glow {
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#0f1422] p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-amber-500 font-bold text-xl tracking-wider">★ HIGH STARS AIMERS</span>
                <span class="text-xs bg-gray-800 text-gray-400 px-2 py-1 rounded">Admin Portal</span>
            </div>
            <div class="flex items-center space-x-6 text-sm font-medium">
                <button class="text-gray-400 hover:text-amber-500 transition border-b-2 border-transparent hover:border-amber-500 pb-1 flex items-center gap-2">
                    📦 Ingestion System
                </button>
                <button class="text-amber-500 border-b-2 border-amber-500 pb-1 flex items-center gap-2 font-semibold">
                    🗄️ Storage Master Explorer
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full p-4 md:p-8 flex-grow">
        <div class="bg-[#121826] border border-gray-800 rounded-xl p-6 shadow-xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 pb-6 border-b border-gray-800">
                <div>
                    <h2 class="text-lg font-semibold text-gray-200">Directory Category: Revision Papers</h2>
                    <p class="text-xs text-gray-500 mt-1">Manage, ingest, and clear secondary curriculum assets.</p>
                </div>
                <button onclick="simulateSync()" class="bg-amber-500 hover:bg-amber-600 text-gray-950 font-bold px-5 py-2.5 rounded-lg shadow-md transition-all active:scale-95 flex items-center gap-2 text-sm uppercase tracking-wider">
                    🔄 Sync Sync
                </button>
            </div>

            <div class="space-y-3">
                <div class="flex items-center justify-between p-4 bg-[#161f32] border border-gray-800 rounded-lg hover:border-gray-700 transition">
                    <div class="flex items-center space-x-3">
                        <div class="text-red-400 text-2xl">📄</div>
                        <div>
                            <p class="text-sm font-medium text-gray-200">MINANT.pdf</p>
                            <span class="text-[11px] bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded font-mono">Mathematics • Form 1</span>
                        </div>
                    </div>
                    <button onclick="simulateZipError()" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded transition">Test Zip Build</button>
                </div>

                <div class="flex items-center justify-between p-4 bg-[#161f32] border border-gray-800 rounded-lg hover:border-gray-700 transition">
                    <div class="flex items-center space-x-3">
                        <div class="text-red-400 text-2xl">📄</div>
                        <div>
                            <p class="text-sm font-medium text-gray-200">ALLIANCE HIGH SCHOOL 2026 DETERMINANT.pdf</p>
                            <span class="text-[11px] bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded font-mono">Mathematics • Form 3</span>
                        </div>
                    </div>
                    <button onclick="simulateIngestionSuccess()" class="text-xs bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded transition">Test Ingestion</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center p-4 text-xs text-gray-600 border-t border-gray-900 bg-[#0b0f19]">
        &copy; 2026 High Stars Aimers. All Rights Reserved.
    </footer>

    <div id="customModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-[#121826] border border-gray-800 w-full max-w-md rounded-xl p-6 shadow-2xl transform scale-95 transition-transform duration-300 accent-glow">
            <div class="flex items-start gap-4">
                <div id="modalIconContainer" class="p-3 rounded-full bg-red-500/10 text-red-400 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                </div>
                <div class="flex-grow">
                    <h3 id="modalTitle" class="text-base font-semibold text-gray-100">Notification</h3>
                    <p id="modalMessage" class="text-sm text-gray-400 mt-2 leading-relaxed font-mono text-xs bg-gray-950/40 p-3 rounded border border-gray-900 max-h-48 overflow-y-auto"></p>
                </div>
            </div>
            <div class="mt-6 flex justify-end">
                <button onclick="closeModal()" class="w-full sm:w-auto bg-gray-800 hover:bg-gray-700 text-gray-200 font-medium px-5 py-2 rounded-lg transition active:scale-98">
                    Dismiss
                </button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <script>
        /**
         * System Modal Controls (Replaces blocking error alerts)
         */
        function showModal(title, message, isError = true) {
            const modal = document.getElementById('customModal');
            const modalBox = modal.querySelector('div');
            const iconContainer = document.getElementById('modalIconContainer');
            
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = message;
            
            if (isError) {
                iconContainer.className = "p-3 rounded-full bg-red-500/10 text-red-400 shrink-0";
                iconContainer.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>`;
            } else {
                iconContainer.className = "p-3 rounded-full bg-amber-500/10 text-amber-400 shrink-0";
                iconContainer.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
            }

            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalBox.classList.remove('scale-95');
        }

        function closeModal() {
            const modal = document.getElementById('customModal');
            const modalBox = modal.querySelector('div');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalBox.classList.add('scale-95');
        }

        /**
         * Global Toast System (Replaces success messages nicely)
         */
        function showToast(message, duration = 4000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            toast.className = "pointer-events-auto bg-[#121826] border-l-4 border-emerald-500 text-gray-200 p-4 rounded-r-xl shadow-xl flex items-start gap-3 transform translate-y-4 opacity-0 transition-all duration-300 border border-y-gray-800 border-r-gray-800";
            toast.innerHTML = `
                <div class="text-emerald-400 shrink-0 mt-0.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                </div>
                <div class="flex-grow text-xs font-medium tracking-wide">
                    ${message}
                </div>
            `;
            
            container.appendChild(toast);
            
            // Trigger animation frame entry
            setTimeout(() => {
                toast.classList.remove('translate-y-4', 'opacity-0');
            }, 10);
            
            // Clear toast away automatically
            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-90');
                setTimeout(() => { toast.remove(); }, 300);
            }, duration);
        }

        /**
         * INTERCEPT OLD WINDOW ALERTS 
         * Automatically routes standard alert() text into your clean layout formats!
         */
        window.alert = function(message) {
            if (message.toLowerCase().includes('fail') || message.toLowerCase().includes('block') || message.toLowerCase().includes('error')) {
                showModal("System Security Halt", message, true);
            } else {
                showToast(message);
            }
        };

        /**
         * Test Simulation Methods (Triggers based on your screenshot errors)
         */
        function simulateZipError() {
            alert("Failed to build multi-download ZIP folder due to network block. Ensure Storage CORS handling configuration values are assigned wildcard parameters.");
        }

        function simulateIngestionSuccess() {
            alert("Ingestion Completed successfully. Cleaned and deployed files.");
        }

        function simulateSync() {
            showToast("Sync sequences initiated. Cloudflare R2 configurations are matching remote metadata catalogs.");
        }
    </script>
</body>
</html>
