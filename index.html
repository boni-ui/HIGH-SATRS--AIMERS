<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High Stars Aimers | Excellence in Education</title>

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0f172a">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #38bdf8;
      --secondary: #818cf8;
      --bg-dark: #0f172a;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
    
    html { scroll-behavior: smooth; }

    body {
      background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Subtle Animated Background */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      z-index: 0;
    }

    .container {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 600px;
      text-align: center;
      position: relative;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      z-index: 1;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 38px;
      font-weight: 700;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 30px;
      font-weight: 300;
    }

    .hero-img {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 35px;
      border: 1px solid var(--glass-border);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .hero-img:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
    }

    /* Professional Grid Layout for Links */
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 30px;
    }

    .nav-grid a {
      text-decoration: none;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: #e2e8f0;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }

    .nav-grid a i {
      margin-right: 12px;
      color: var(--primary);
      font-size: 18px;
    }

    .nav-grid a:hover {
      background: rgba(56, 189, 248, 0.1);
      border-color: var(--primary);
      transform: scale(1.02);
      color: #fff;
    }

    /* Full-width special link */
    .featured-link {
      grid-column: span 2;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(129, 140, 248, 0.2)) !important;
      border-color: rgba(56, 189, 248, 0.4) !important;
    }

    footer {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--glass-border);
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
    }

    .developer-tag {
      display: block;
      margin-top: 8px;
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 11px;
    }

    @media (max-width: 500px) {
      .nav-grid { grid-template-columns: 1fr; }
      .featured-link { grid-column: span 1; }
      .container { padding: 30px 20px; }
      h1 { font-size: 30px; }
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>

  <div class="container">
    <header>
      <h1>High Stars Aimers</h1>
      <p class="subtitle">Empowering the next generation of scholars</p>
    </header>

    <img src="https://i.postimg.cc/MpH2Cjc6/file-00000000a8046230bc1b196305d9b3b4-conversation-id-685a6dbd-5aa8-800e-a943-4ac4d1da4bea-message-i.png" alt="Education Banner" class="hero-img">

    <div class="nav-grid">
      <a href="sign.html"><i class="fas fa-book-open"></i> Subjects</a>
      <a href="sign.html"><i class="fas fa-file-signature"></i> Exam Papers</a>
      <a href="sign.html"><i class="fas fa-microchip"></i> Smart Calculator</a>
      <a href="sign.html"><i class="fas fa-calendar-alt"></i> Study Plan</a>
      <a href="sign.html"><i class="fas fa-medal"></i> Leaderboard</a>
      <a href="contact.html"><i class="fas fa-info-circle"></i> About Us</a>
      <a href="sign.html" class="featured-link"><i class="fas fa-layer-group"></i> Access Resource Hub</a>
    </div>

    <footer>
      <p>&copy; 2026 High Stars Aimers. All rights reserved.</p>
      <span class="developer-tag">Developed by Boni Mbugua</span>
    </footer>
  </div>

</body>
</html>
