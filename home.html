<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
    <h1>Welcome to Our Site!</h1>
    <div id="login">
        <h2>Login</h2>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="#signup">Sign up here</a>.</p>
    </div>
    <div id="signup">
        <h2>Sign Up</h2>
        <form>
            <label for="new-username">Username:</label>
            <input type="text" id="new-username" name="new-username" required><br>
            <label for="new-password">Password:</label>
            <input type="password" id="new-password" name="new-password" required><br>
            <button type="button" onclick="showDevelopmentPopup()">Sign Up</button>
        </form>
    </div>
    <div id="development-popup" style="display:none;">
        <h3>Development Notice</h3>
        <p>This feature is still under development!</p>
        <button type="button" onclick="closePopup()">Close</button>
    </div>
    <div id="profile">
        <h2>Your Profile</h2>
        <label for="profile-pic">Profile Picture:</label>
        <input type="file" id="profile-pic" name="profile-pic"><br>
        <img id="profile-pic-display" src="#" alt="Profile Picture" style="max-width: 200px; display:none;">
        <script>
            document.getElementById('profile-pic').addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.getElementById('profile-pic-display');
                        img.src = e.target.result;
                        img.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });
        </script>
    </div>
    <div id="mobile-input">
        <h2>Enter Your Mobile Number</h2>
        <form>
            <label for="mobile">Mobile Number:</label>
            <input type="tel" id="mobile" name="mobile" required placeholder="123-456-7890"><br>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
