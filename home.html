<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Command | High Stars Aimers</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold-primary: #ffb347;
      --gold-secondary: #ffcc33;
      --gold-gradient: linear-gradient(135deg, #ffb347 0%, #ffcc33 100%);
      --bg-deep: #020408;
      --bg-card: rgba(15, 23, 42, 0.4);
      --text-bright: #ffffff;
      --text-dim: #94a3b8;
      --border-gold: rgba(255, 179, 71, 0.15);
      --glass: blur(16px);
      --shadow-gold: 0 15px 35px -12px rgba(255, 179, 71, 0.25);
      --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-deep);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(255, 179, 71, 0.08) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(255, 179, 71, 0.05) 0%, transparent 35%);
      color: var(--text-bright);
      line-height: 1.6;
      padding-bottom: 100px;
    }

    /* === TOP NAVIGATION === */
    .nav {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(2, 4, 8, 0.85);
      backdrop-filter: var(--glass);
      border-bottom: 1px solid var(--border-gold);
      padding: 1.2rem 6%;
      display: flex; justify-content: space-between; align-items: center;
    }

    .brand {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
      background: var(--gold-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 10px;
    }

    .nav-user {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 14px; border-radius: 50px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-gold);
      cursor: pointer; transition: var(--transition);
    }

    .nav-user img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--gold-primary); }

    /* === BOTTOM NAVIGATION === */
    .bottom-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 500px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-gold);
      border-radius: 24px;
      padding: 12px 25px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1001;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .b-nav-item {
      color: var(--text-dim); text-decoration: none;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 0.7rem; font-weight: 600; transition: 0.3s;
    }
    .b-nav-item.active { color: var(--gold-primary); }

    /* === MODAL & QUICK LINKS === */
    .modal {
        position: fixed; inset: 0; background: rgba(0,0,0,0.95);
        display: none; align-items: center; justify-content: center; z-index: 2000;
        backdrop-filter: blur(15px);
    }
    .modal.active { display: flex; }
    
    .modal-box {
        background: #0b1120; border-radius: 35px;
        border: 1px solid var(--border-gold); width: 95%; max-width: 480px;
        max-height: 90vh; overflow-y: auto; position: relative;
    }

    .modal-header { padding: 25px; text-align: center; background: rgba(255,255,255,0.02); }
    
    /* 3-Line / 3-Column Quick Actions */
    .quick-actions-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 20px;
        background: rgba(15, 23, 42, 0.5);
    }

    .action-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-gold);
        border-radius: 16px;
        padding: 15px 10px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        text-decoration: none;
        color: inherit;
    }

    .action-card:hover { background: rgba(255, 179, 71, 0.1); border-color: var(--gold-primary); }
    .action-card i { color: var(--gold-primary); font-size: 1.2rem; margin-bottom: 8px; display: block; }
    .action-card span { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

    .settings-tabs {
        display: flex; border-bottom: 1px solid var(--border-gold);
    }
    .tab-btn {
        flex: 1; padding: 15px; border: none; background: none; color: var(--text-dim);
        font-weight: 700; cursor: pointer; font-size: 0.8rem;
    }
    .tab-btn.active { color: var(--gold-primary); border-bottom: 2px solid var(--gold-primary); }

    .tab-content { padding: 25px; display: none; }
    .tab-content.active { display: block; }

    .setting-item { margin-bottom: 18px; }
    .setting-item label { display: block; font-size: 0.7rem; color: var(--gold-primary); margin-bottom: 5px; text-transform: uppercase; font-weight: 800; }
    .setting-input {
        width: 100%; padding: 12px; background: rgba(2, 4, 8, 0.5);
        border: 1px solid var(--border-gold); border-radius: 12px; color: #fff; font-family: inherit;
    }

    .btn-save { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--gold-gradient); font-weight: 800; cursor: pointer; margin-top: 10px; font-family: inherit; }

    .vault-item {
        display: flex; align-items: center; gap: 15px;
        padding: 12px; background: rgba(255,255,255,0.02);
        border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border-gold);
    }

    .rank-tag {
        display: inline-block; padding: 3px 10px; background: rgba(255, 179, 71, 0.1);
        color: var(--gold-primary); border: 1px solid var(--gold-primary);
        border-radius: 50px; font-size: 0.6rem; font-weight: 800; margin-top: 8px;
    }

  </style>
</head>
<body>

<nav class="nav">
  <div class="brand"><i class="fas fa-bolt"></i><span>HIGH STARS AIMERS</span></div>
  <div class="nav-user" id="profileTrigger">
    <span id="navUserName">Loading...</span>
    <img id="topNavAvatar" src="" alt="Avatar">
  </div>
</nav>

<div class="bottom-nav">
  <a href="#" class="b-nav-item active"><i class="fas fa-th-large"></i><span>Hub</span></a>
  <a href="subjects.html" class="b-nav-item"><i class="fas fa-book"></i><span>Library</span></a>
  <a href="#" class="b-nav-item"><i class="fas fa-brain"></i><span>AI Bot</span></a>
  <a href="#" class="b-nav-item" id="mobileProfileTrigger"><i class="fas fa-cog"></i><span>Settings</span></a>
</div>

<div id="profileModal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <div style="position: relative; display: inline-block;">
                <img id="userProfilePic" src="" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold-primary);">
                <div onclick="document.getElementById('profileInput').click()" style="position: absolute; bottom: 0; right: 0; background: var(--gold-primary); border-radius: 50%; padding: 6px; cursor: pointer;">
                    <i class="fas fa-pen" style="color: #000; font-size: 0.6rem;"></i>
                </div>
            </div>
            <h3 id="welcomeMessage" style="margin-top: 10px;">User Name</h3>
            <div class="rank-tag">ELITE RANK: STAR AIMER</div>
            <input type="file" id="profileInput" accept="image/*" style="display: none;">
        </div>

        <div class="quick-actions-grid">
            <div class="action-card" onclick="openTab(null, 'security')">
                <i class="fas fa-lock"></i>
                <span>Password</span>
            </div>
            <div class="action-card" onclick="openTab(null, 'vault')">
                <i class="fas fa-cloud-download-alt"></i>
                <span>Vault</span>
            </div>
            <div class="action-card">
                <i class="fas fa-moon"></i>
                <span>Night</span>
            </div>
            <div class="action-card">
                <i class="fas fa-medal"></i>
                <span>Stats</span>
            </div>
            <div class="action-card">
                <i class="fas fa-share-alt"></i>
                <span>Invite</span>
            </div>
            <div class="action-card" id="signOutAction">
                <i class="fas fa-power-off" style="color: #ef4444;"></i>
                <span style="color: #ef4444;">Exit</span>
            </div>
        </div>

        <div class="settings-tabs">
            <button class="tab-btn active" id="btn-general" onclick="openTab(event, 'general')">Profile</button>
            <button class="tab-btn" id="btn-vault" onclick="openTab(event, 'vault')">Saved</button>
            <button class="tab-btn" id="btn-security" onclick="openTab(event, 'security')">Safety</button>
        </div>

        <div id="general" class="tab-content active">
            <div class="setting-item">
                <label>Display Name</label>
                <input type="text" id="editDisplayName" class="setting-input" placeholder="Your Name">
            </div>
            <div class="setting-item">
                <label>Current Syllabus</label>
                <input type="text" class="setting-input" value="KCSE Secondary 2026" disabled style="opacity: 0.6;">
            </div>
            <button class="btn-save" id="saveProfile">Save Changes</button>
        </div>

        <div id="vault" class="tab-content">
            <div class="vault-item">
                <i class="fas fa-file-pdf" style="color: var(--gold-primary);"></i>
                <div style="flex: 1;">
                    <div style="font-size: 0.8rem; font-weight: 700;">Physics Molar Heat.pdf</div>
                    <div style="font-size: 0.6rem; color: var(--text-dim);">Saved May 3, 2026</div>
                </div>
                <i class="fas fa-trash-alt" style="color: #ef4444; font-size: 0.8rem; cursor: pointer;"></i>
            </div>
        </div>

        <div id="security" class="tab-content">
            <div class="setting-item">
                <label>Update Password</label>
                <input type="password" id="newPassword" class="setting-input" placeholder="Enter new password">
            </div>
            <button class="btn-save" id="changePassBtn">Apply New Password</button>
        </div>

        <p onclick="document.getElementById('profileModal').classList.remove('active')" style="text-align: center; padding: 20px; font-size: 0.7rem; cursor: pointer; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Dismiss Settings</p>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updateProfile, updatePassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
  authDomain: "high-stars-aimers-5972f.firebaseapp.com",
  projectId: "high-stars-aimers-5972f",
  storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
  messagingSenderId: "233345875942",
  appId: "1:233345875942:web:cf7610de84f0b2262ce027"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const storage = getStorage(app);

// Global Tab Switcher
window.openTab = (evt, tabName) => {
    const contents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
    
    const btns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
    
    document.getElementById(tabName).style.display = "block";
    if(evt) {
        evt.currentTarget.classList.add("active");
    } else {
        document.getElementById('btn-' + tabName).classList.add("active");
    }
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        const name = user.displayName || user.email.split('@')[0];
        const userPhoto = user.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${name}`;
        document.getElementById("navUserName").innerText = name;
        document.getElementById("welcomeMessage").innerText = name;
        document.getElementById("userProfilePic").src = userPhoto;
        document.getElementById("topNavAvatar").src = userPhoto;
        document.getElementById("editDisplayName").value = name;
    } else {
        window.location.href = "signin1.html"; 
    }
});

const trigger = () => document.getElementById('profileModal').classList.add('active');
document.getElementById('profileTrigger').onclick = trigger;
document.getElementById('mobileProfileTrigger').onclick = (e) => { e.preventDefault(); trigger(); };

document.getElementById('saveProfile').onclick = async () => {
    const newName = document.getElementById('editDisplayName').value;
    if(!newName) return;
    await updateProfile(auth.currentUser, { displayName: newName });
    alert("Profile Synced.");
    location.reload();
};

document.getElementById('changePassBtn').onclick = async () => {
    const newPass = document.getElementById('newPassword').value;
    if(newPass.length < 6) { alert("Security requires 6+ characters."); return; }
    try {
        await updatePassword(auth.currentUser, newPass);
        alert("Password Encrypted.");
    } catch (e) { alert("Re-authentication required."); }
};

document.getElementById('profileInput').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const storageRef = ref(storage, 'avatars/' + auth.currentUser.uid);
    const snapshot = await uploadBytes(storageRef, file);
    const downloadURL = await getDownloadURL(snapshot.ref);
    await updateProfile(auth.currentUser, { photoURL: downloadURL });
    location.reload();
};

document.getElementById("signOutAction").onclick = () => signOut(auth);
</script>

</body>
</html>
