<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Your Dashboard, User!</h1>
    </header>
    <main>
        <section id="login">
            <h2>Login</h2>
            <p>Welcome back! Please login to continue.</p>
            <form action="#" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </section>
        <section id="signup">
            <h2>Sign Up</h2>
            <button onclick="showDevPopup()">Sign Up</button>
            <div id="devPopup" class="popup">
                <span class="close" onclick="closeDevPopup()">&times;</span>
                <h3>Under Development</h3>
                <p>This feature is currently under development. Please check back later!</p>
            </div>
        </section>
        <section id="profile">
            <h2>Profile</h2>
            <input type="file" id="profilePicUpload" accept="image/*">
            <img id="profilePic" src="#" alt="Profile Picture" style="display: none;">
            <script>
                const profilePicUpload = document.getElementById('profilePicUpload');
                const profilePic = document.getElementById('profilePic');
                profilePicUpload.onchange = (event) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        profilePic.src = reader.result;
                        profilePic.style.display = 'block';
                    };
                    reader.readAsDataURL(event.target.files[0]);
                };
            </script>
        </section>
        <section id="sms-details">
            <h2>SMS Details</h2>
            <input type="text" placeholder="Enter your mobile number" required>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
    <script>
        function showDevPopup() {
            document.getElementById('devPopup').style.display = 'block';
        }
        function closeDevPopup() {
            document.getElementById('devPopup').style.display = 'none';
        }
    </script>
</body>
</html>
