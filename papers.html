<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revision Papers | High Stars Aimers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #00f0ff; --bg: #0a0f1f; --card: rgba(35, 40, 60, 0.8); }
    body { font-family: 'Segoe UI', sans-serif; color: #e0e0e0; background-color: var(--bg); margin:0; }
    .header { padding: 15px 20px; background: var(--bg); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { margin: 0; font-size: 1.5rem; color: white; }
    main { padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 25px; }
    h2 { color: var(--primary); }
    .subjects-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; width: 100%; max-width: 900px; }
    .subject-card { background: var(--card); padding: 25px; border-radius: 12px; text-align: center; border: 1px solid rgba(0, 240, 255, 0.1); cursor: pointer; position: relative; transition: 0.3s; }
    .subject-card:hover { border-color: var(--primary); transform: translateY(-5px); }
    .dropdown { display: none; position: absolute; top: 105%; left: 50%; transform: translateX(-50%); background: #161b2d; border: 1px solid var(--primary); border-radius: 8px; width: 180px; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .dropdown a { display: block; color: white; padding: 12px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .dropdown a:last-child { border: none; }
    .dropdown a:hover { background: var(--primary); color: black; }
    .subject-card.active .dropdown { display: block; }
    .footer { text-align: center; padding: 20px; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>High Stars Aimers</h1>
    <a href="home.html" style="color:white; text-decoration:none;"><i class="fas fa-home"></i> Home</a>
  </div>

  <main>
    <h2>Revision Papers</h2>
    <div class="subjects-container">
      
      <script>
        const subjects = [
          { name: "Mathematics", icon: "fa-square-root-alt" },
          { name: "English", icon: "fa-book" },
          { name: "Kiswahili", icon: "fa-language" },
          { name: "Physics", icon: "fa-atom" },
          { name: "Chemistry", icon: "fa-flask" },
          { name: "Biology", icon: "fa-dna" },
          { name: "Geography", icon: "fa-globe-africa" },
          { name: "History", icon: "fa-landmark" },
          { name: "CRE", icon: "fa-cross" },
          { name: "Business Studies", icon: "fa-briefcase" },
          { name: "Agriculture", icon: "fa-seedling" },
          { name: "Computer Studies", icon: "fa-laptop-code" }
        ];

        subjects.forEach(sub => {
          document.write(`
            <div class="subject-card" onclick="this.classList.toggle('active')">
              <i class="fas ${sub.icon} fa-3x" style="color:var(--primary)"></i>
              <h3>${sub.name}</h3>
              <div class="dropdown">
                <a href="view-resources.html?type=revision_papers&subject=${sub.name}&form=Form 1">Form 1</a>
                <a href="view-resources.html?type=revision_papers&subject=${sub.name}&form=Form 2">Form 2</a>
                <a href="view-resources.html?type=revision_papers&subject=${sub.name}&form=Form 3">Form 3</a>
                <a href="view-resources.html?type=revision_papers&subject=${sub.name}&form=Form 4">Form 4</a>
              </div>
            </div>
          `);
        });
      </script>

    </div>
  </main>
  <footer class="footer">&copy; 2026 High Stars Aimers</footer>
</body>
</html>
