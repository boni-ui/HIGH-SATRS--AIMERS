<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Stars Aimers | Secure Elite Auth</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #f57c00;
            --accent: #e65100;
            --bg-deep: #05080f;
            --card-bg: #0c121e;
            --input-bg: #05080f;
            --text: #ffffff;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --success: #10b981;
            --danger: #ef4444;
            --bronze-dim: #824b21;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #sparks-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #111a2e 0%, #05080f 100%); }

        .toast-container {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; padding: 15px 20px;
            background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4);
            backdrop-filter: blur(15px); border-radius: 18px; display: flex; align-items: center; gap: 12px;
            z-index: 2000; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
        }
        .toast-container.active { top: 25px; opacity: 1; }
        .toast-container.success { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); }
        .toast-msg { font-size: 0.85rem; font-weight: 600; color: #fff; line-height: 1.4; }

        .container {
            position: relative; width: 440px; max-width: 90%; padding: 45px 40px;
            background: var(--card-bg); border-radius: 35px; border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 30px; }

        .btn-action {
            width: 100%; padding: 16px; border-radius: 14px; border: none; background: #fff; 
            color: #000; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; 
            font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google { background: #1a2235; color: white; border: 1px solid var(--border); margin-bottom: 10px; }
        .btn-google i { color: #4285F4; }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-dim); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider::before { margin-right: 15px; } .divider::after { margin-left: 15px; }

        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        .field-wrapper { position: relative; }
        input { width: 100%; padding: 14px 45px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .field-wrapper i:first-child { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #334155; }
        .view-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-dim); }

        .strength-bar { height: 3px; background: rgba(255,255,255,0.05); margin: 10px 0; border-radius: 10px; overflow: hidden; }
        .strength-progress { height: 100%; width: 0%; transition: 0.5s; background: var(--primary); }
        
        .requirements { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 20px; }
        .req-item { font-size: 0.65rem; color: var(--text-dim); display: flex; align-items: center; gap: 6px; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .req-item.valid { color: var(--success); background: rgba(16, 185, 129, 0.05); }

        .switch-text { margin-top: 20px; font-size: 0.8rem; color: var(--text-dim); }
        .switch-text span { color: var(--primary); cursor: pointer; font-weight: 700; }

        #access-overlay { position: fixed; inset: 0; background: rgba(5,8,15,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(15px); }
        .success-shield { font-size: 4rem; color: var(--success); margin-bottom: 15px; animation: pulse 2s infinite; }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .form-content { display: none; }
        .form-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="sparks-canvas"></canvas>

    <div class="toast-container" id="toast">
        <i id="toastIcon" class="fas fa-exclamation-triangle"></i>
        <span class="toast-msg" id="toastMsg">Verification required</span>
    </div>

    <div id="access-overlay">
        <i class="fas fa-shield-check success-shield"></i>
        <h1 style="color: var(--success)">AUTHENTICATED</h1>
        <p style="color: var(--text-dim)">Accessing Secure Environment...</p>
    </div>

    <div class="container" id="mainContainer">
        <div id="loginSection" class="form-content active">
            <h1>Aim High.</h1>
            <p class="subtitle">Secure Academic Identity Cloud</p>
            
            <button type="button" class="btn-action btn-google" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i> Continue with Google
            </button>

            <div class="divider">or credentials</div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Identity Email</label>
                    <div class="field-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="name@email.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Passkey</label>
                    <div class="field-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye view-toggle" onclick="togglePass('password', this)"></i>
                    </div>
                </div>
                <button type="submit" class="btn-action" id="loginBtn">Authorize Session</button>
            </form>
            <p class="switch-text">First time? <span onclick="toggleForm()">Create Profile</span></p>
        </div>

        <div id="signupSection" class="form-content">
            <h1>Initialize</h1>
            <p class="subtitle">Create your learning cloud identity</p>
            
            <button type="button" class="btn-action btn-google" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i> Sign up with Google
            </button>

            <div class="divider">or secure setup</div>

            <form id="signupForm">
                <div class="input-group">
                    <label>Academic Email</label>
                    <div class="field-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="email" id="newEmail" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Create Passkey</label>
                    <div class="field-wrapper">
                        <i class="fas fa-shield-alt"></i>
                        <input type="password" id="newPassword" required oninput="validatePassword()">
                        <i class="fas fa-eye view-toggle" onclick="togglePass('newPassword', this)"></i>
                    </div>
                </div>
                <div class="strength-bar"><div id="strengthProgress" class="strength-progress"></div></div>
                <div class="requirements">
                    <div class="req-item" id="r-len"><i class="fas fa-circle"></i> 8+ Char</div>
                    <div class="req-item" id="r-up"><i class="fas fa-circle"></i> Caps</div>
                    <div class="req-item" id="r-num"><i class="fas fa-circle"></i> Number</div>
                    <div class="req-item" id="r-spec"><i class="fas fa-circle"></i> Symbol</div>
                </div>
                <button type="submit" class="btn-action btn-signup" id="regBtn" disabled style="background: var(--bronze-dim); color: #fff;">Finalize Profile</button>
            </form>
            <p class="switch-text">Already a member? <span onclick="toggleForm()">Secure Login</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            sendEmailVerification, GoogleAuthProvider, signInWithPopup, getRedirectResult 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
            authDomain: "high-stars-aimers-5972f.firebaseapp.com",
            projectId: "high-stars-aimers-5972f",
            storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
            messagingSenderId: "233345875942",
            appId: "1:233345875942:web:cf7610de84f0b2262ce027"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const showToast = (msg, type = 'error') => {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = `toast-container active ${type}`;
            document.getElementById('toastIcon').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-triangle';
            setTimeout(() => toast.classList.remove('active'), 5000);
        };

        const triggerSuccess = () => {
            document.getElementById('access-overlay').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => { window.location.href = "home.html"; }, 2000);
        };

        // --- GOOGLE LOGIN ---
        window.handleGoogleLogin = async () => {
            try {
                // signInWithPopup is more compatible for most users
                const result = await signInWithPopup(auth, provider);
                if(result.user) triggerSuccess();
            } catch (err) {
                console.error("Google Auth Error:", err.code);
                showToast(mapError(err.code));
            }
        };

        const mapError = (code) => {
            switch(code) {
                case 'auth/email-already-in-use': return 'This email is already registered.';
                case 'auth/invalid-credential': return 'Wrong email or password.';
                case 'auth/popup-closed-by-user': return 'Login window closed.';
                case 'auth/operation-not-allowed': return 'Google login is not enabled in Firebase.';
                default: return `System Error: ${code.split('/')[1]?.replace(/-/g, ' ') || 'Refused'}`;
            }
        };

        // --- EMAIL LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';

            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if (!res.user.emailVerified) {
                    showToast("Please check your email and verify your account.");
                    btn.disabled = false;
                    btn.innerHTML = "Authorize Session";
                } else {
                    triggerSuccess();
                }
            } catch (err) {
                document.getElementById('mainContainer').classList.add('shake');
                setTimeout(() => document.getElementById('mainContainer').classList.remove('shake'), 500);
                showToast(mapError(err.code));
                btn.disabled = false;
                btn.innerHTML = "Authorize Session";
            }
        });

        // --- SIGNUP ---
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const email = document.getElementById('newEmail').value;
            const pass = document.getElementById('newPassword').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Setting up...';

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(res.user);
                showToast("Identity Created! Check your email for verification.", "success");
                window.toggleForm();
                btn.disabled = false;
                btn.innerHTML = "Finalize Profile";
            } catch (err) {
                showToast(mapError(err.code));
                btn.disabled = false;
                btn.innerHTML = "Finalize Profile";
            }
        });
    </script>

    <script>
        // UI Helpers
        window.toggleForm = () => {
            document.querySelectorAll('.form-content').forEach(f => f.classList.toggle('active'));
        };
        window.togglePass = (id, icon) => {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'fas fa-eye view-toggle' : 'fas fa-eye-slash view-toggle';
        };
        window.validatePassword = () => {
            const p = document.getElementById('newPassword').value;
            const checks = { len: p.length >= 8, up: /[A-Z]/.test(p), num: /[0-9]/.test(p), spec: /[^A-Za-z0-9]/.test(p) };
            let score = 0;
            Object.entries(checks).forEach(([k, v]) => {
                const el = document.getElementById('r-' + k);
                if(v) { el.classList.add('valid'); score++; }
                else el.classList.remove('valid');
            });
            document.getElementById('strengthProgress').style.width = (score * 25) + "%";
            const btn = document.getElementById('regBtn');
            btn.disabled = score < 4;
            btn.style.background = score === 4 ? "var(--primary)" : "var(--bronze-dim)";
        };

        // Sparks
        const canvas = document.getElementById('sparks-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        const init = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        class P {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = canvas.height + 10; this.s = Math.random() * 2; this.sy = Math.random() * 1.5 + 0.5; this.o = Math.random() * 0.5; }
            update() { this.y -= this.sy; if (this.y < -10) this.reset(); }
            draw() { ctx.fillStyle = `rgba(245,124,0,${this.o})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, 7); ctx.fill(); }
        }
        for(let i=0; i<40; i++) parts.push(new P());
        const loop = () => { ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(loop); };
        init(); loop(); window.onresize = init;
    </script>
</body>
</html>
