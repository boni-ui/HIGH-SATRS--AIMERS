<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Stars Aimers | Secure Elite Auth</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #f57c00;
            --accent: #e65100;
            --bg-deep: #05080f;
            --card-bg: #0c121e;
            --input-bg: #05080f;
            --text: #ffffff;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --success: #10b981;
            --danger: #ef4444;
            --bronze-dim: #824b21;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #sparks-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #111a2e 0%, #05080f 100%); }

        .loading-overlay {
            position: absolute; inset: 0; background: rgba(12, 18, 30, 0.9);
            backdrop-filter: blur(10px); border-radius: 35px; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner-ring {
            width: 45px; height: 45px; border: 3px solid rgba(245, 124, 0, 0.1);
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .toast-container {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; padding: 15px 20px;
            background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4);
            backdrop-filter: blur(15px); border-radius: 18px; display: flex; align-items: center; gap: 12px;
            z-index: 2000; transition: 0.5s; opacity: 0;
        }
        .toast-container.active { top: 25px; opacity: 1; }
        .toast-container.success { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); }

        .container {
            position: relative; width: 440px; max-width: 100%; padding: 45px 40px;
            background: var(--card-bg); border-radius: 35px; border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 30px; }

        .btn-action {
            width: 100%; padding: 16px; border-radius: 14px; border: none; background: #fff; 
            color: #000; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; 
            font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google { background: #1a2235; color: white; border: 1px solid var(--border); margin-bottom: 10px; }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-dim); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider::before { margin-right: 15px; } .divider::after { margin-left: 15px; }

        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        .field-wrapper { position: relative; }
        input[type="email"], input[type="password"], input[type="text"] { width: 100%; padding: 14px 45px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 12px; font-size: 0.9rem; transition: 0.3s; }
        input[type="email"]:focus, input[type="password"]:focus, input[type="text"]:focus { outline: none; border-color: var(--primary); background: rgba(245, 124, 0, 0.05); }
        .field-wrapper i:first-child { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #334155; }
        .view-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-dim); }

        /* Forgot Password link */
        .forgot-link { display: block; text-align: right; font-size: 0.7rem; color: var(--primary); text-decoration: none; margin-top: -10px; margin-bottom: 20px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .forgot-link:hover { color: var(--accent); }

        /* Checkbox Styles */
        .terms-container { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; cursor: pointer; }
        .terms-container input { width: 18px; height: 18px; margin-top: 2px; cursor: pointer; accent-color: var(--primary); }
        .terms-text { font-size: 0.7rem; color: var(--text-dim); line-height: 1.4; }
        .terms-text a { color: var(--primary); text-decoration: none; font-weight: 600; transition: 0.2s; }
        .terms-text a:hover { color: var(--accent); text-decoration: underline; }

        .strength-bar { height: 4px; background: rgba(255,255,255,0.05); margin: 10px 0; border-radius: 10px; overflow: hidden; }
        .strength-progress { height: 100%; width: 0%; transition: 0.5s; background: var(--danger); }
        
        .requirements { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 20px; }
        .req-item { font-size: 0.65rem; color: var(--text-dim); display: flex; align-items: center; gap: 6px; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .req-item.valid { color: var(--success); }

        .switch-text { margin-top: 20px; font-size: 0.8rem; color: var(--text-dim); text-align: center; }
        .switch-text span { color: var(--primary); cursor: pointer; font-weight: 700; transition: 0.2s; }
        .switch-text span:hover { color: var(--accent); }

        /* Footer Links */
        .footer-links {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footer-links a {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .footer-links a:hover {
            color: var(--primary);
        }
        .footer-divider {
            color: var(--border);
        }

        #access-overlay { position: fixed; inset: 0; background: rgba(5,8,15,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(20px); }
        .form-content { display: none; }
        .form-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <canvas id="sparks-canvas"></canvas>

    <div class="toast-container" id="toast">
        <i id="toastIcon" class="fas fa-exclamation-triangle"></i>
        <span class="toast-msg" id="toastMsg"></span>
    </div>

    <div id="access-overlay">
        <i class="fas fa-shield-check" style="font-size: 4rem; color: var(--success); margin-bottom: 15px;"></i>
        <h1 style="color: var(--success)">AUTHENTICATED</h1>
    </div>

    <div class="container" id="mainContainer">
        <div class="loading-overlay" id="authLoader">
            <div class="spinner-ring"></div>
            <p style="font-size: 0.65rem; color: var(--primary); font-weight: 800; letter-spacing: 2px;">HANDSHAKING IDENTITY</p>
        </div>

        <div id="loginSection" class="form-content active">
            <h1>Aim High.</h1>
            <p class="subtitle">Secure Academic Identity Cloud</p>
            <button type="button" class="btn-action btn-google" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <div class="divider">or credentials</div>
            <form id="loginForm">
                <div class="input-group">
                    <label>Identity Email</label>
                    <div class="field-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="name@email.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Passkey</label>
                    <div class="field-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye view-toggle" onclick="togglePass('password', this)"></i>
                    </div>
                </div>
                <span class="forgot-link" onclick="handleForgotPassword()">Forgot Passkey?</span>
                <button type="submit" class="btn-action" id="loginBtn">Authorize Session</button>
            </form>
            <p class="switch-text">First time? <span onclick="toggleForm()">Create Profile</span></p>
        </div>

        <div id="signupSection" class="form-content">
            <h1>Initialize</h1>
            <p class="subtitle">Create your learning identity</p>
            <button type="button" class="btn-action btn-google" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i> Sign up with Google
            </button>
            <div class="divider">or secure setup</div>
            <form id="signupForm">
                <div class="input-group">
                    <label>Academic Email</label>
                    <div class="field-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="email" id="newEmail" required placeholder="your@email.com">
                    </div>
                </div>
                <div class="input-group">
                    <label>Create Passkey</label>
                    <div class="field-wrapper">
                        <i class="fas fa-shield-alt"></i>
                        <input type="password" id="newPassword" required oninput="validatePassword()" placeholder="••••••••">
                        <i class="fas fa-eye view-toggle" onclick="togglePass('newPassword', this)"></i>
                    </div>
                </div>
                <div class="strength-bar"><div id="strengthProgress" class="strength-progress"></div></div>
                <div class="input-group">
                    <label>Confirm Passkey</label>
                    <div class="field-wrapper">
                        <i class="fas fa-check-double"></i>
                        <input type="password" id="confirmPassword" required oninput="validatePassword()" placeholder="••••••••">
                    </div>
                </div>
                <div class="requirements">
                    <div class="req-item" id="r-len"><i class="fas fa-circle"></i> 8+ Char</div>
                    <div class="req-item" id="r-up"><i class="fas fa-circle"></i> Caps</div>
                    <div class="req-item" id="r-num"><i class="fas fa-circle"></i> Number</div>
                    <div class="req-item" id="r-match"><i class="fas fa-circle"></i> Match</div>
                </div>

                <div class="terms-container">
                    <input type="checkbox" id="termsCheck" required onchange="validatePassword()">
                    <label for="termsCheck" class="terms-text">
                        I accept the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>. I understand this is a secure academic environment.
                    </label>
                </div>

                <button type="submit" class="btn-action" id="regBtn" disabled style="background: var(--bronze-dim); color: #fff;">Finalize Profile</button>
            </form>
            <p class="switch-text">Already a member? <span onclick="toggleForm()">Secure Login</span></p>
        </div>

        <!-- Footer Links -->
        <div class="footer-links">
            <a href="privacy.html" target="_blank">Privacy Policy</a>
            <span class="footer-divider">•</span>
            <a href="terms.html" target="_blank">Terms of Service</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
            authDomain: "high-stars-aimers-5972f.firebaseapp.com",
            projectId: "high-stars-aimers-5972f",
            storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
            messagingSenderId: "233345875942",
            appId: "1:233345875942:web:cf7610de84f0b2262ce027"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const showToast = (msg, type = 'error') => {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = `toast-container active ${type}`;
            setTimeout(() => toast.classList.remove('active'), 5000);
        };

        const toggleLoading = (show) => { document.getElementById('authLoader').style.display = show ? 'flex' : 'none'; };

        // Global functions for Firebase
        window.handleGoogleLogin = async () => {
            toggleLoading(true);
            try {
                await signInWithPopup(auth, provider);
                document.getElementById('access-overlay').style.display = 'flex';
                confetti();
                setTimeout(() => { window.location.href = "home.html"; }, 2000);
            } catch (err) {
                showToast(err.message);
                toggleLoading(false);
            }
        };

        window.handleForgotPassword = async () => {
            const email = document.getElementById('email').value;
            if (!email) {
                showToast("Please enter your email address first.");
                return;
            }
            toggleLoading(true);
            try {
                await sendPasswordResetEmail(auth, email);
                showToast("Reset link sent to your email!", "success");
            } catch (err) {
                showToast("Error: " + err.message);
            } finally {
                toggleLoading(false);
            }
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            toggleLoading(true);
            try {
                const res = await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                if (!res.user.emailVerified) {
                    showToast("Please verify your email.");
                    toggleLoading(false);
                } else {
                    document.getElementById('access-overlay').style.display = 'flex';
                    setTimeout(() => { window.location.href = "home.html"; }, 2000);
                }
            } catch (err) {
                document.getElementById('mainContainer').classList.add('shake');
                setTimeout(() => document.getElementById('mainContainer').classList.remove('shake'), 500);
                showToast("Invalid credentials");
                toggleLoading(false);
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            toggleLoading(true);
            try {
                const res = await createUserWithEmailAndPassword(auth, document.getElementById('newEmail').value, document.getElementById('newPassword').value);
                await sendEmailVerification(res.user);
                showToast("Verification email sent!", "success");
                window.toggleForm();
                toggleLoading(false);
            } catch (err) {
                showToast(err.message);
                toggleLoading(false);
            }
        });
    </script>

    <script>
        window.toggleForm = () => {
            document.getElementById('loginSection').classList.toggle('active');
            document.getElementById('signupSection').classList.toggle('active');
        };

        window.togglePass = (id, icon) => {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
            icon.className = el.type === 'password' ? 'fas fa-eye view-toggle' : 'fas fa-eye-slash view-toggle';
        };

        window.validatePassword = () => {
            const p = document.getElementById('newPassword').value;
            const cp = document.getElementById('confirmPassword').value;
            const termsAccepted = document.getElementById('termsCheck').checked;

            const checks = {
                len: p.length >= 8,
                up: /[A-Z]/.test(p),
                num: /[0-9]/.test(p),
                match: p === cp && p !== ""
            };

            document.getElementById('r-len').className = checks.len ? 'req-item valid' : 'req-item';
            document.getElementById('r-up').className = checks.up ? 'req-item valid' : 'req-item';
            document.getElementById('r-num').className = checks.num ? 'req-item valid' : 'req-item';
            document.getElementById('r-match').className = checks.match ? 'req-item valid' : 'req-item';

            const score = Object.values(checks).filter(Boolean).length;
            document.getElementById('strengthProgress').style.width = (score / 4 * 100) + "%";
            
            const btn = document.getElementById('regBtn');
            // Finalize Profile only enabled if all 4 checks pass AND terms are accepted
            if (score === 4 && termsAccepted) {
                btn.disabled = false;
                btn.style.background = "var(--primary)";
            } else {
                btn.disabled = true;
                btn.style.background = "var(--bronze-dim)";
            }
        };
    </script>
</body>
</html>
