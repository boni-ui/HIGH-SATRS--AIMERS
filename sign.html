<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Stars Aimers - Auth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: #e9ebee;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .container {
            background-color: #fff;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.35);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 100%;
            min-height: 480px;
        }

        .container p { font-size: 14px; line-height: 20px; letter-spacing: 0.3px; margin: 20px 0; }
        .container span { font-size: 12px; }
        .container a { color: #333; font-size: 13px; text-decoration: none; margin: 15px 0 10px; }
        
        .container button {
            background-color: #512da8;
            color: #fff;
            font-size: 12px;
            padding: 10px 45px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
        }

        .container button.hidden { background-color: transparent; border-color: #fff; }

        .container form {
            background-color: #fff;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 0 40px; height: 100%;
        }

        .container input {
            background-color: #eee;
            border: none;
            margin: 8px 0;
            padding: 10px 15px;
            font-size: 13px;
            border-radius: 8px;
            width: 100%;
            outline: none;
        }

        .form-container { position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out; }

        .sign-in { left: 0; width: 50%; z-index: 2; }
        .container.active .sign-in { transform: translateX(100%); }

        .sign-up { left: 0; width: 50%; opacity: 0; z-index: 1; }
        .container.active .sign-up { transform: translateX(100%); opacity: 1; z-index: 5; animation: move 0.6s; }

        @keyframes move { 0%, 49.99% { opacity: 0; z-index: 1; } 50%, 100% { opacity: 1; z-index: 5; } }

        .social-icons { margin: 20px 0; }
        .social-icons a {
            border: 1px solid #ccc; border-radius: 20%;
            display: inline-flex; justify-content: center; align-items: center;
            margin: 0 3px; width: 40px; height: 40px;
        }

        /* The Purple Sliding Overlay */
        .toggle-container {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            overflow: hidden; transition: all 0.6s ease-in-out; border-radius: 150px 0 0 100px; z-index: 1000;
        }

        .container.active .toggle-container { transform: translateX(-100%); border-radius: 0 150px 100px 0; }

        .toggle {
            background-color: #512da8; height: 100%;
            background: linear-gradient(to right, #5c6bc0, #512da8);
            color: #fff; position: relative; left: -100%; height: 100%; width: 200%;
            transform: translateX(0); transition: all 0.6s ease-in-out;
        }

        .container.active .toggle { transform: translateX(50%); }

        .toggle-panel {
            position: absolute; width: 50%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 0 30px; text-align: center;
            top: 0; transform: translateX(0); transition: all 0.6s ease-in-out;
        }

        .toggle-left { transform: translateX(-200%); }
        .container.active .toggle-left { transform: translateX(0); }

        .toggle-right { right: 0; transform: translateX(0); }
        .container.active .toggle-right { transform: translateX(200%); }

        /* Error/Success Messages */
        #errorMsg, #signupMsg { font-size: 12px; margin-top: 10px; }
        .error-text { color: #ff4d4d; }
        .success-text { color: #2ecc71; }
        
        .password-wrapper { width: 100%; position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #777; }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form onsubmit="return false;">
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a href="#" id="googleBtnSignup" class="icon"><i class="fa-brands fa-google"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email for registration</span>
                <input type="email" id="newEmail" placeholder="Email">
                <div class="password-wrapper">
                    <input type="password" id="newPassword" placeholder="Password">
                    <i class="fas fa-eye toggle-password" onclick="togglePass('newPassword', this)"></i>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                    <i class="fas fa-eye toggle-password" onclick="togglePass('confirmPassword', this)"></i>
                </div>
                <button onclick="registerUser()">Sign Up</button>
                <p id="signupMsg"></p>
            </form>
        </div>

        <div class="form-container sign-in">
            <form onsubmit="return false;">
                <h1>Sign In</h1>
                <div class="social-icons">
                    <a href="#" id="googleBtnSignin" class="icon"><i class="fa-brands fa-google"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email password</span>
                <input type="email" id="email" placeholder="Email">
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Password">
                    <i class="fas fa-eye toggle-password" onclick="togglePass('password', this)"></i>
                </div>
                <a href="#" id="forgot-password-link">Forgot Your Password?</a>
                <button onclick="signIn()">Sign In</button>
                <p id="errorMsg"></p>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <p>Enter your personal details to use all of site features</p>
                    <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <p>Register with your personal details to use all of site features</p>
                    <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            sendEmailVerification, sendPasswordResetEmail, GoogleAuthProvider, 
            signInWithPopup, onAuthStateChanged, signOut 
        } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhJD5Ux22U393z6RqT4Nv570jqoNrg7Xc",
            authDomain: "high-stars-aimers-5972f.firebaseapp.com",
            projectId: "high-stars-aimers-5972f",
            storageBucket: "high-stars-aimers-5972f.firebasestorage.app",
            messagingSenderId: "233345875942",
            appId: "1:233345875942:web:0b21df2fd59b744d2ce027",
            measurementId: "G-JEV6M3EP1D"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // UI Toggling Logic
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.addEventListener('click', () => container.classList.add("active"));
        loginBtn.addEventListener('click', () => container.classList.remove("active"));

        window.togglePass = (id, icon) => {
            const el = document.getElementById(id);
            const isPass = el.type === "password";
            el.type = isPass ? "text" : "password";
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        // Firebase Functions
        window.signIn = () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const msg = document.getElementById("errorMsg");

            signInWithEmailAndPassword(auth, email, password)
                .then(userCredential => {
                    if (!userCredential.user.emailVerified) {
                        signOut(auth);
                        msg.className = "error-text";
                        msg.textContent = "Please verify your email first.";
                    } else {
                        window.location.href = "home.html";
                    }
                })
                .catch(err => {
                    msg.className = "error-text";
                    msg.textContent = err.message;
                });
        };

        window.registerUser = () => {
            const email = document.getElementById("newEmail").value.trim();
            const password = document.getElementById("newPassword").value;
            const confirm = document.getElementById("confirmPassword").value;
            const msg = document.getElementById("signupMsg");

            if(password !== confirm) {
                msg.className = "error-text";
                msg.textContent = "Passwords do not match.";
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then(userCredential => {
                    sendEmailVerification(userCredential.user);
                    msg.className = "success-text";
                    msg.textContent = "Verification email sent! Please check your inbox.";
                })
                .catch(err => {
                    msg.className = "error-text";
                    msg.textContent = err.message;
                });
        };

        const googleLogin = () => {
            signInWithPopup(auth, googleProvider)
                .then(() => window.location.href = "home.html")
                .catch(console.error);
        };

        document.getElementById('googleBtnSignin').onclick = googleLogin;
        document.getElementById('googleBtnSignup').onclick = googleLogin;

        document.getElementById('forgot-password-link').onclick = (e) => {
            const email = document.getElementById("email").value;
            if(!email) return alert("Enter email first");
            sendPasswordResetEmail(auth, email).then(() => alert("Reset email sent!"));
        };
    </script>
</body>
  </html>
