<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Stars Aimers | Secure Elite Auth</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #f57c00;
            --accent: #e65100;
            --bg-deep: #05080f;
            --card-bg: #0c121e;
            --input-bg: #05080f;
            --text: #ffffff;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --success: #10b981;
            --bronze-dim: #824b21;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 1. SPARKS BACKGROUND SYSTEM */
        #sparks-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111a2e 0%, #05080f 100%);
        }

        /* CONTAINER SETUP */
        .container {
            position: relative;
            width: 440px;
            max-width: 90%;
            padding: 45px 40px;
            background: var(--card-bg);
            border-radius: 35px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        h1 { font-size: 2.1rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.8px; }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 35px; font-weight: 500; }

        /* INPUT GROUP ENHANCEMENTS */
        .input-group { position: relative; margin-bottom: 22px; transition: 0.3s; }
        
        label { 
            display: block; 
            font-size: 0.65rem; 
            font-weight: 800; 
            color: var(--text-dim); 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1.2px;
            transition: 0.3s;
        }
        
        .field-wrapper { position: relative; border-radius: 14px; overflow: hidden; }
        
        input {
            width: 100%; 
            padding: 16px 48px; 
            background: var(--input-bg); 
            border: 1px solid var(--border);
            color: white; 
            outline: none; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(245, 124, 0, 0.15); }
        input:focus ~ i:first-child { color: var(--primary); }
        
        .field-wrapper i:first-child { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #334155; transition: 0.3s; }
        .view-toggle { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-dim); font-size: 0.85rem; padding: 5px; }

        /* PASSWORD STRENGTH METER */
        .strength-bar {
            height: 3px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            margin-top: -10px;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
        }
        .strength-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4d4d, #f57c00, #10b981);
            transition: 0.6s ease;
        }

        /* REQUIREMENT CHIPS */
        .requirements { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .req-item { 
            font-size: 0.7rem; 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 10px 12px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 10px;
            font-weight: 600;
        }
        .req-item.valid { color: #f1f5f9; background: rgba(16, 185, 129, 0.1); }
        .req-item.valid i { color: var(--success); }

        /* BUTTONS */
        .btn-action {
            width: 100%; 
            padding: 18px; 
            border-radius: 14px; 
            border: none;
            background: #ffffff; 
            color: #000; 
            font-weight: 800; 
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-size: 0.85rem;
        }
        .btn-action:active { transform: scale(0.97); }
        .btn-signup { background: var(--bronze-dim); color: rgba(255,255,255,0.7); }

        /* FORM SWITCHING ANIMATION */
        .form-content { display: none; }
        .form-content.active { display: block; animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .switch-text { margin-top: 30px; text-align: center; color: var(--text-dim); font-size: 0.85rem; font-weight: 500; }
        .switch-text span { color: var(--primary); cursor: pointer; font-weight: 700; margin-left: 5px; }

        .footer-branding {
            position: absolute; bottom: -50px; left: 0; width: 100%;
            text-align: center; font-size: 0.75rem; color: var(--text-dim);
        }
        .footer-branding span { color: var(--primary); font-weight: 700; }

    </style>
</head>
<body>

    <canvas id="sparks-canvas"></canvas>

    <div class="container">
        <div id="loginSection" class="form-content active">
            <h1>Aim High.</h1>
            <p class="subtitle">Access your Academic Cloud Profile</p>
            
            <form onsubmit="handleAuth(event, 'login')">
                <div class="input-group">
                    <label>Identity Email</label>
                    <div class="field-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="student@email.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Secure Passkey</label>
                    <div class="field-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye view-toggle" onclick="togglePass('password', this)"></i>
                    </div>
                </div>
                <button type="submit" class="btn-action" id="loginBtn">Authorize Session</button>
            </form>
            <p class="switch-text">New Aimer? <span onclick="toggleForm()">Create Profile</span></p>
        </div>

        <div id="signupSection" class="form-content">
            <h1>Elite Membership</h1>
            <p class="subtitle">Initialize your learning cloud identity</p>
            
            <form onsubmit="handleAuth(event, 'signup')">
                <div class="input-group">
                    <label>Academic Email</label>
                    <div class="field-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="email" id="newEmail" placeholder="name@email.com" required>
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 12px;">
                    <label>Create Passkey</label>
                    <div class="field-wrapper">
                        <i class="fas fa-shield-alt"></i>
                        <input type="password" id="newPassword" placeholder="••••••••" required oninput="validatePassword()">
                        <i class="fas fa-eye view-toggle" onclick="togglePass('newPassword', this)"></i>
                    </div>
                </div>
                
                <div class="strength-bar"><div id="strengthProgress" class="strength-progress"></div></div>

                <div class="input-group">
                    <label>Confirm Passkey</label>
                    <div class="field-wrapper">
                        <i class="fas fa-check-double"></i>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required oninput="validatePassword()">
                        <i class="fas fa-eye view-toggle" onclick="togglePass('confirmPassword', this)"></i>
                    </div>
                </div>

                <div class="requirements">
                    <div class="req-item" id="r-len"><i class="fas fa-circle"></i> 8+ Char</div>
                    <div class="req-item" id="r-up"><i class="fas fa-circle"></i> 1 Uppercase</div>
                    <div class="req-item" id="r-num"><i class="fas fa-circle"></i> 1 Numeric</div>
                    <div class="req-item" id="r-spec"><i class="fas fa-circle"></i> 1 Special ($@!)</div>
                </div>

                <button type="submit" class="btn-action btn-signup" id="regBtn" disabled>Finalize Identity</button>
            </form>
            <p class="switch-text">Already verified? <span onclick="toggleForm()">Secure Login</span></p>
        </div>

        <div class="footer-branding">
            &copy; 2026 High Stars Aimers. <span>Privacy Policy</span> & <span>Terms of Use</span>
        </div>
    </div>

    <script>
        // --- 1. SPARKS ENGINE ---
        const canvas = document.getElementById('sparks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(245, 124, 0, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        // --- 2. LOGIC & FEATURES ---
        function toggleForm() {
            const sections = document.querySelectorAll('.form-content');
            sections.forEach(s => s.classList.toggle('active'));
        }

        function togglePass(id, icon) {
            const input = document.getElementById(id);
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            icon.className = isPass ? 'fas fa-eye-slash view-toggle' : 'fas fa-eye view-toggle';
        }

        function validatePassword() {
            const p = document.getElementById('newPassword').value;
            const cp = document.getElementById('confirmPassword').value;
            const progress = document.getElementById('strengthProgress');
            
            const checks = {
                len: p.length >= 8,
                up: /[A-Z]/.test(p),
                num: /[0-9]/.test(p),
                spec: /[^A-Za-z0-9]/.test(p)
            };

            let score = 0;
            for(const [key, passed] of Object.entries(checks)) {
                const el = document.getElementById('r-' + key);
                if(passed) { el.classList.add('valid'); score++; }
                else { el.classList.remove('valid'); }
            }

            progress.style.width = (score * 25) + "%";
            
            const btn = document.getElementById('regBtn');
            const isValid = score === 4 && p === cp && p.length > 0;
            
            btn.disabled = !isValid;
            btn.style.background = isValid ? "var(--primary)" : "var(--bronze-dim)";
            btn.style.color = isValid ? "#fff" : "rgba(255,255,255,0.7)";
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

            setTimeout(() => {
                if(type === 'signup') {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#f57c00', '#ffffff'] });
                }
                btn.disabled = false;
                btn.innerText = originalText;
                alert(type === 'login' ? "Session Authorized!" : "Identity Created! Please check email.");
            }, 1800);
        }
    </script>
</body>
</html>
